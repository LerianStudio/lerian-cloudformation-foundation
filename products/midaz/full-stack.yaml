AWSTemplateFormatVersion: '2010-09-09'
Description: |
  Midaz - Complete Stack (AWS Marketplace)
  Deploys complete Midaz infrastructure AND application in a single stack.
  Includes: VPC, EKS, RDS, DocumentDB, ElastiCache, AmazonMQ, and Midaz application.
  (c) Lerian Studio - https://lerian.studio

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: "AWS Marketplace Configuration"
        Parameters:
          - MPS3BucketName
          - MPS3BucketRegion
          - MPS3KeyPrefix
          - MarketplaceAMI
      - Label:
          default: "General Configuration"
        Parameters:
          - EnvironmentName
          - ProjectName
      - Label:
          default: "Cluster Configuration"
        Parameters:
          - UseExistingCluster
          - ExistingClusterName
          - ExistingVpcId
          - ExistingPrivateSubnetIds
          - ExistingOIDCProviderArn
      - Label:
          default: "Network Configuration"
        Parameters:
          - VpcCIDR
          - AvailabilityZone1
          - AvailabilityZone2
          - AvailabilityZone3
          - EnableFlowLogs
          - FlowLogsRetentionDays
      - Label:
          default: "EKS Configuration"
        Parameters:
          - KubernetesVersion
          - NodeInstanceType
          - NodeGroupMinSize
          - NodeGroupMaxSize
          - NodeGroupDesiredSize
      - Label:
          default: "RDS PostgreSQL Configuration"
        Parameters:
          - RDSInstanceClass
          - RDSAllocatedStorage
          - RDSMaxAllocatedStorage
          - RDSStorageType
          - RDSIops
          - RDSDatabaseName
          - RDSMasterUsername
          - CreateReadReplica
          - RDSForceSSL
          - RDSMultiAZ
          - RDSDeletionProtection
          - RDSBackupRetentionPeriod
      - Label:
          default: "DocumentDB Configuration"
        Parameters:
          - DocumentDBInstanceClass
          - DocumentDBInstanceCount
          - DocumentDBMasterUsername
          - DocumentDBDeletionProtection
          - DocumentDBBackupRetentionPeriod
      - Label:
          default: "ElastiCache (Valkey/Redis) Configuration"
        Parameters:
          - ElastiCacheNodeType
      - Label:
          default: "AmazonMQ (RabbitMQ) Configuration"
        Parameters:
          - AmazonMQInstanceType
          - AmazonMQDeploymentMode
          - AmazonMQAdminUsername
      - Label:
          default: "Additional Network Access"
        Parameters:
          - AdditionalIngressCIDR1
          - AdditionalIngressCIDR2
          - AdditionalIngressCIDR3
      - Label:
          default: "DNS Configuration"
        Parameters:
          - EnableALBController
          - EnableExternalDNS
      - Label:
          default: "Ledger Configuration"
        Parameters:
          - DeployMidazApplication
          - MidazVersion
          - MidazReplicas
      - Label:
          default: "Domain Configuration"
        Parameters:
          - DomainName
      - Label:
          default: "Ledger Ingress Configuration"
        Parameters:
          - EnableIngress
          - IngressHostname
          - IngressCertificateArn
      - Label:
          default: "CRM Configuration"
        Parameters:
          - EnableCRM
      - Label:
          default: "CRM Ingress Configuration"
        Parameters:
          - EnableCRMIngress
          - CRMIngressHostname
    ParameterLabels:
      # AWS Marketplace
      MPS3BucketName:
        default: "Template S3 Bucket Name"
      MPS3BucketRegion:
        default: "Template S3 Bucket Region"
      MPS3KeyPrefix:
        default: "Template S3 Key Prefix"
      MarketplaceAMI:
        default: "Marketplace AMI ID"
      # Ledger Configuration
      DeployMidazApplication:
        default: "Deploy Midaz Application"
      MidazVersion:
        default: "Midaz Version"
      MidazReplicas:
        default: "Number of Replicas"
      # Domain Configuration
      DomainName:
        default: "Domain Name"
      # Ledger Ingress
      EnableIngress:
        default: "Enable Ledger Ingress (ALB)"
      IngressHostname:
        default: "Ledger Ingress Hostname"
      IngressCertificateArn:
        default: "ACM Certificate ARN"
      # CRM Configuration
      EnableCRM:
        default: "Enable CRM Service"
      # CRM Ingress
      EnableCRMIngress:
        default: "Enable CRM Ingress (ALB)"
      CRMIngressHostname:
        default: "CRM Ingress Hostname"
      # General
      EnvironmentName:
        default: "Environment"
      ProjectName:
        default: "Project Name"
      # Cluster
      UseExistingCluster:
        default: "Use Existing Cluster"
      ExistingClusterName:
        default: "Existing Cluster Name"
      ExistingVpcId:
        default: "Existing VPC ID"
      ExistingPrivateSubnetIds:
        default: "Existing Private Subnet IDs"
      ExistingOIDCProviderArn:
        default: "Existing OIDC Provider ARN"
      # Network
      VpcCIDR:
        default: "VPC CIDR Block"
      AvailabilityZone1:
        default: "Availability Zone 1"
      AvailabilityZone2:
        default: "Availability Zone 2"
      AvailabilityZone3:
        default: "Availability Zone 3"
      EnableFlowLogs:
        default: "Enable VPC Flow Logs"
      FlowLogsRetentionDays:
        default: "Flow Logs Retention (Days)"
      # EKS
      KubernetesVersion:
        default: "Kubernetes Version"
      NodeInstanceType:
        default: "Node Instance Type"
      NodeGroupMinSize:
        default: "Minimum Nodes"
      NodeGroupMaxSize:
        default: "Maximum Nodes"
      NodeGroupDesiredSize:
        default: "Desired Nodes"
      # RDS
      RDSInstanceClass:
        default: "RDS Instance Class"
      RDSAllocatedStorage:
        default: "Initial Storage (GB)"
      RDSMaxAllocatedStorage:
        default: "Maximum Storage (GB)"
      RDSStorageType:
        default: "Storage Type"
      RDSIops:
        default: "Provisioned IOPS"
      RDSDatabaseName:
        default: "Database Name"
      RDSMasterUsername:
        default: "Master Username"
      CreateReadReplica:
        default: "Create Read Replica"
      RDSForceSSL:
        default: "Force SSL Connections"
      RDSMultiAZ:
        default: "Multi-AZ Deployment"
      RDSDeletionProtection:
        default: "Deletion Protection"
      RDSBackupRetentionPeriod:
        default: "Backup Retention (Days)"
      # DocumentDB
      DocumentDBInstanceClass:
        default: "DocumentDB Instance Class"
      DocumentDBInstanceCount:
        default: "Number of Instances"
      DocumentDBMasterUsername:
        default: "Master Username"
      DocumentDBDeletionProtection:
        default: "Deletion Protection"
      DocumentDBBackupRetentionPeriod:
        default: "Backup Retention (Days)"
      # ElastiCache
      ElastiCacheNodeType:
        default: "Cache Node Type"
      # AmazonMQ
      AmazonMQInstanceType:
        default: "Broker Instance Type"
      AmazonMQDeploymentMode:
        default: "Deployment Mode"
      AmazonMQAdminUsername:
        default: "Admin Username"
      # Additional Network Access
      AdditionalIngressCIDR1:
        default: "Additional CIDR 1"
      AdditionalIngressCIDR2:
        default: "Additional CIDR 2"
      AdditionalIngressCIDR3:
        default: "Additional CIDR 3"
      # DNS
      DomainName:
        default: "Domain Name (Optional)"
      EnableALBController:
        default: "Enable ALB Controller"
      EnableExternalDNS:
        default: "Enable ExternalDNS"

Parameters:
  # =============================================================================
  # AWS MARKETPLACE PARAMETERS (Required for Nested Stacks)
  # =============================================================================
  MPS3BucketName:
    Type: String
    Description: "S3 bucket name containing the CloudFormation templates (managed by AWS Marketplace)"
    Default: "midaz-cloudformation-foundation"

  MPS3BucketRegion:
    Type: String
    Description: "AWS Region where the S3 bucket is located (fixed to sa-east-1)"
    Default: "sa-east-1"
    AllowedValues:
      - sa-east-1

  MPS3KeyPrefix:
    Type: String
    Description: "S3 key prefix for the CloudFormation templates"
    Default: "releases/latest/"
    AllowedPattern: "^[a-zA-Z0-9-_./]*$"
    ConstraintDescription: "Key prefix can include alphanumeric characters, hyphens, underscores, periods, and forward slashes"

  MarketplaceAMI:
    Type: String
    Description: "AWS Marketplace AMI ID (required by Marketplace form only, EKS uses managed AMIs)"
    Default: "ami-placeholder"

  # =============================================================================
  # CLUSTER CONFIGURATION
  # =============================================================================
  UseExistingCluster:
    Type: String
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
    Description: |
      Set to true to deploy services into an existing VPC and EKS cluster
      (e.g., when deploying a second product to a shared cluster).
      When true, ExistingClusterName, ExistingVpcId and ExistingPrivateSubnetIds are required.

  ExistingClusterName:
    Type: String
    Default: ""
    Description: "Name of the existing EKS cluster (required when UseExistingCluster=true)"

  ExistingVpcId:
    Type: String
    Default: ""
    Description: "VPC ID where services will be deployed (required when UseExistingCluster=true)"

  ExistingPrivateSubnetIds:
    Type: String
    Default: ""
    Description: "Comma-separated list of private subnet IDs (required when UseExistingCluster=true)"

  ExistingOIDCProviderArn:
    Type: String
    Default: ""
    Description: "OIDC Provider ARN of the existing EKS cluster (required when EnableALBController=true or EnableExternalDNS=true with UseExistingCluster=true)"

  # =============================================================================
  # GENERAL CONFIGURATION
  # =============================================================================
  EnvironmentName:
    Type: String
    Default: production
    AllowedValues:
      - development
      - staging
      - production
    Description: Environment name for resource tagging

  ProjectName:
    Type: String
    Default: midaz
    Description: Project name used for resource naming
    AllowedPattern: "^[a-zA-Z][a-zA-Z0-9-]*$"
    MinLength: 3
    MaxLength: 128
    ConstraintDescription: "Must begin with a letter, contain only letters, numbers, and hyphens, and be 3-128 characters long"

  # Network
  VpcCIDR:
    Type: String
    Default: 10.50.0.0/16
    Description: CIDR block for the VPC
    AllowedPattern: ^(([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])\.){3}([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])(\/([0-9]|[1-2][0-9]|3[0-2]))$

  AvailabilityZone1:
    Type: AWS::EC2::AvailabilityZone::Name
    Description: First Availability Zone

  AvailabilityZone2:
    Type: AWS::EC2::AvailabilityZone::Name
    Description: Second Availability Zone

  AvailabilityZone3:
    Type: AWS::EC2::AvailabilityZone::Name
    Description: Third Availability Zone

  EnableFlowLogs:
    Type: String
    AllowedValues:
      - "true"
      - "false"
    Default: "true"
    Description: Enable VPC Flow Logs for network traffic auditing and security analysis.

  FlowLogsRetentionDays:
    Type: Number
    Default: 30
    AllowedValues:
      - 1
      - 3
      - 5
      - 7
      - 14
      - 30
      - 60
      - 90
      - 120
      - 150
      - 180
      - 365
      - 400
      - 545
      - 731
      - 1827
      - 3653
    Description: Number of days to retain VPC Flow Logs in CloudWatch.

  # EKS
  KubernetesVersion:
    Type: String
    Default: "1.35"
    AllowedValues:
      - "1.33"
      - "1.34"
      - "1.35"
    Description: Kubernetes version for EKS cluster

  NodeInstanceType:
    Type: String
    Default: c7g.large
    AllowedValues:
      - c7g.medium
      - c7g.large
      - c7g.xlarge
      - c7g.2xlarge
      - m7g.medium
      - m7g.large
      - m7g.xlarge
      - m7g.2xlarge
      - r7g.medium
      - r7g.large
      - r7g.xlarge
      - c6g.medium
      - c6g.large
      - c6g.xlarge
      - c6g.2xlarge
      - c6i.large
      - c6i.xlarge
      - c6i.2xlarge
      - m6g.medium
      - m6g.large
      - m6g.xlarge
    Description: EC2 instance type for EKS worker nodes (ARM64 Graviton)

  NodeGroupMinSize:
    Type: Number
    Default: 3
    MinValue: 1
    MaxValue: 100
    Description: Minimum number of worker nodes

  NodeGroupMaxSize:
    Type: Number
    Default: 15
    MinValue: 1
    MaxValue: 100
    Description: Maximum number of worker nodes

  NodeGroupDesiredSize:
    Type: Number
    Default: 3
    MinValue: 1
    MaxValue: 100
    Description: Desired number of worker nodes

  # RDS
  RDSInstanceClass:
    Type: String
    Default: db.r7g.large
    AllowedValues:
      - db.t3.micro
      - db.t3.small
      - db.t3.medium
      - db.t3.large
      - db.m7g.large
      - db.m7g.xlarge
      - db.r7g.large
      - db.r7g.xlarge
      - db.r7g.2xlarge
      - db.r7g.4xlarge
      - db.r7g.8xlarge
      - db.r7g.12xlarge
      - db.r7g.16xlarge
    Description: RDS instance class

  RDSAllocatedStorage:
    Type: Number
    Default: 100
    MinValue: 20
    MaxValue: 65536
    Description: Initial storage allocation in GB

  RDSMaxAllocatedStorage:
    Type: Number
    Default: 500
    MinValue: 20
    MaxValue: 65536
    Description: Maximum storage for autoscaling in GB

  RDSStorageType:
    Type: String
    Default: gp3
    AllowedValues:
      - gp3
      - io1
      - io2
    Description: Storage type for RDS instance

  RDSIops:
    Type: Number
    Default: 3000
    MinValue: 3000
    MaxValue: 64000
    Description: Provisioned IOPS for RDS storage. For gp3 max is 16000, for io1/io2 max is 64000.

  RDSDatabaseName:
    Type: String
    Default: midaz
    Description: Name of the initial database
    AllowedPattern: "^[a-zA-Z][a-zA-Z0-9_]*$"
    MinLength: 1
    MaxLength: 64
    ConstraintDescription: "Must begin with a letter and contain only alphanumeric characters and underscores"

  RDSMasterUsername:
    Type: String
    NoEcho: true
    Description: Master username for RDS (required, no default for security)
    AllowedPattern: "^[a-zA-Z][a-zA-Z0-9_]*$"
    MinLength: 1
    MaxLength: 63
    ConstraintDescription: "Must begin with a letter and contain only alphanumeric characters and underscores"

  CreateReadReplica:
    Type: String
    Default: "true"
    AllowedValues:
      - "true"
      - "false"
    Description: Create a read replica for RDS

  RDSForceSSL:
    Type: String
    Default: "0"
    AllowedValues:
      - "0"
      - "1"
    Description: Force SSL/TLS connections to RDS (1 = enabled, 0 = disabled). Recommended for production with sensitive data.

  RDSMultiAZ:
    Type: String
    Default: "true"
    AllowedValues:
      - "true"
      - "false"
    Description: Enable Multi-AZ deployment for high availability. Recommended for production workloads.

  RDSDeletionProtection:
    Type: String
    Default: "true"
    AllowedValues:
      - "true"
      - "false"
    Description: Enable deletion protection to prevent accidental database deletion.

  RDSBackupRetentionPeriod:
    Type: Number
    Default: 30
    MinValue: 1
    MaxValue: 35
    Description: Number of days to retain automated backups (1-35). Recommended 30+ for production.

  # DocumentDB
  DocumentDBInstanceClass:
    Type: String
    Default: db.r6g.large
    AllowedValues:
      - db.t3.medium
      - db.r6g.large
      - db.r6g.xlarge
      - db.r6g.2xlarge
      - db.r6g.4xlarge
      - db.r6g.8xlarge
      - db.r6g.12xlarge
    Description: DocumentDB instance class

  DocumentDBInstanceCount:
    Type: Number
    Default: 3
    MinValue: 1
    MaxValue: 10
    Description: Number of DocumentDB instances

  DocumentDBMasterUsername:
    Type: String
    NoEcho: true
    Description: Master username for DocumentDB (required, no default for security)
    AllowedPattern: "^[a-zA-Z][a-zA-Z0-9_]*$"
    MinLength: 1
    MaxLength: 63
    ConstraintDescription: "Must begin with a letter and contain only alphanumeric characters and underscores"

  DocumentDBDeletionProtection:
    Type: String
    Default: "true"
    AllowedValues:
      - "true"
      - "false"
    Description: Enable deletion protection to prevent accidental cluster deletion.

  DocumentDBBackupRetentionPeriod:
    Type: Number
    Default: 30
    MinValue: 1
    MaxValue: 35
    Description: Number of days to retain automated backups (1-35). Recommended 30+ for production.

  # ElastiCache
  ElastiCacheNodeType:
    Type: String
    Default: cache.m7g.large
    AllowedValues:
      - cache.t3.micro
      - cache.t3.small
      - cache.t3.medium
      - cache.m7g.large
      - cache.m7g.xlarge
      - cache.r7g.large
      - cache.r7g.xlarge
    Description: ElastiCache node type

  # AmazonMQ
  AmazonMQInstanceType:
    Type: String
    Default: mq.m5.large
    AllowedValues:
      - mq.t3.micro
      - mq.m5.large
      - mq.m5.xlarge
      - mq.m5.2xlarge
      - mq.m5.4xlarge
      - mq.m7g.large
      - mq.m7g.xlarge
      - mq.m7g.2xlarge
      - mq.m7g.4xlarge
      - mq.m7g.8xlarge
      - mq.m7g.12xlarge
      - mq.m7g.16xlarge
    Description: AmazonMQ broker instance type

  AmazonMQDeploymentMode:
    Type: String
    Default: SINGLE_INSTANCE
    AllowedValues:
      - SINGLE_INSTANCE
      - CLUSTER_MULTI_AZ
    Description: Broker deployment mode. CLUSTER_MULTI_AZ deploys 3 nodes across AZs for HA.

  AmazonMQAdminUsername:
    Type: String
    NoEcho: true
    Description: Admin username for AmazonMQ (required, no default for security)
    AllowedPattern: "^[a-zA-Z][a-zA-Z0-9_]*$"
    MinLength: 1
    MaxLength: 100
    ConstraintDescription: "Must begin with a letter and contain only alphanumeric characters and underscores"

  # =============================================================================
  # ADDITIONAL NETWORK ACCESS
  # =============================================================================
  AdditionalIngressCIDR1:
    Type: String
    Default: ""
    Description: "Additional CIDR block for resource access (e.g., VPN, VPC peering). Leave empty to skip."
    AllowedPattern: "^$|^(([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])\\.){3}([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])(\\/([0-9]|[1-2][0-9]|3[0-2]))$"
    ConstraintDescription: "Must be a valid CIDR block or empty"

  AdditionalIngressCIDR2:
    Type: String
    Default: ""
    Description: "Additional CIDR block for resource access (e.g., VPN, VPC peering). Leave empty to skip."
    AllowedPattern: "^$|^(([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])\\.){3}([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])(\\/([0-9]|[1-2][0-9]|3[0-2]))$"
    ConstraintDescription: "Must be a valid CIDR block or empty"

  AdditionalIngressCIDR3:
    Type: String
    Default: ""
    Description: "Additional CIDR block for resource access (e.g., VPN, VPC peering). Leave empty to skip."
    AllowedPattern: "^$|^(([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])\\.){3}([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])(\\/([0-9]|[1-2][0-9]|3[0-2]))$"
    ConstraintDescription: "Must be a valid CIDR block or empty"

  # =============================================================================
  # DNS CONFIGURATION
  # =============================================================================
  EnableALBController:
    Type: String
    Default: "true"
    AllowedValues:
      - "true"
      - "false"
    Description: Enable AWS Load Balancer Controller for Ingress

  EnableExternalDNS:
    Type: String
    Default: "true"
    AllowedValues:
      - "true"
      - "false"
    Description: Enable ExternalDNS for automatic DNS management (requires DomainName)

  # =============================================================================
  # LEDGER CONFIGURATION
  # =============================================================================
  DeployMidazApplication:
    Type: String
    Default: "true"
    AllowedValues:
      - "true"
      - "false"
    Description: Deploy Midaz application via Helm (set to false for infrastructure-only deployment)

  MidazVersion:
    Type: String
    Default: "5.7.0"
    Description: Midaz Helm chart version to deploy
    AllowedPattern: "^[a-zA-Z0-9.-]+$"
    ConstraintDescription: "Must be a valid version string"

  MidazReplicas:
    Type: Number
    Default: 2
    MinValue: 1
    MaxValue: 10
    Description: Number of Midaz application replicas

  # =============================================================================
  # DOMAIN CONFIGURATION
  # =============================================================================
  DomainName:
    Type: String
    Default: ""
    Description: Domain name for Route53 private hosted zone (e.g., midaz.empresa.com). Leave empty to skip DNS setup.
    AllowedPattern: "^$|^[a-zA-Z0-9][a-zA-Z0-9-]{0,61}[a-zA-Z0-9]?(\\.[a-zA-Z0-9][a-zA-Z0-9-]{0,61}[a-zA-Z0-9]?)*$"
    ConstraintDescription: "Must be a valid domain name (e.g., example.com or sub.example.com) or empty"

  # =============================================================================
  # LEDGER INGRESS CONFIGURATION
  # =============================================================================
  EnableIngress:
    Type: String
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
    Description: Enable ALB Ingress for Ledger external access

  IngressHostname:
    Type: String
    Default: ""
    Description: Full hostname for Ledger Ingress (e.g., ledger.midaz.net). Required if EnableIngress=true.
    AllowedPattern: "^$|^[a-zA-Z0-9][a-zA-Z0-9-]{0,61}[a-zA-Z0-9]?(\\.[a-zA-Z0-9][a-zA-Z0-9-]{0,61}[a-zA-Z0-9]?)*$"
    ConstraintDescription: "Must be a valid hostname or empty"

  IngressCertificateArn:
    Type: String
    Default: ""
    Description: ACM Certificate ARN for HTTPS (optional, requires EnableIngress=true)
    AllowedPattern: "^$|^arn:aws:acm:[a-z0-9-]+:[0-9]+:certificate/[a-f0-9-]+$"
    ConstraintDescription: "Must be a valid ACM certificate ARN or empty"

  # =============================================================================
  # CRM CONFIGURATION
  # =============================================================================
  EnableCRM:
    Type: String
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
    Description: Enable CRM service (optional, uses same DocumentDB as Midaz)

  # =============================================================================
  # CRM INGRESS CONFIGURATION
  # =============================================================================
  EnableCRMIngress:
    Type: String
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
    Description: Enable ALB Ingress for CRM service (requires EnableCRM=true)

  CRMIngressHostname:
    Type: String
    Default: ""
    Description: Full hostname for CRM Ingress (e.g., crm.midaz.net). Required if EnableCRMIngress=true.
    AllowedPattern: "^$|^[a-zA-Z0-9][a-zA-Z0-9-]{0,61}[a-zA-Z0-9]?(\\.[a-zA-Z0-9][a-zA-Z0-9-]{0,61}[a-zA-Z0-9]?)*$"
    ConstraintDescription: "Must be a valid hostname or empty"

Rules:
  IngressRequiresALBController:
    RuleCondition: !Equals [!Ref EnableIngress, "true"]
    Assertions:
      - Assert: !Equals [!Ref EnableALBController, "true"]
        AssertDescription: "EnableALBController must be 'true' when EnableIngress is 'true'"

Conditions:
  CreateNewCluster: !Equals [!Ref UseExistingCluster, "false"]
  CreateRDSReplica: !Equals [!Ref CreateReadReplica, "true"]
  HasDomainName: !Not [!Equals [!Ref DomainName, ""]]
  ShouldEnableALBController: !Equals [!Ref EnableALBController, "true"]
  ShouldEnableExternalDNS: !And
    - !Condition HasDomainName
    - !Equals [!Ref EnableExternalDNS, "true"]

  # Application conditions
  ShouldDeployApplication: !Equals [!Ref DeployMidazApplication, "true"]
  ShouldDeployWithALB: !And
    - !Condition ShouldDeployApplication
    - !Condition ShouldEnableALBController
  ShouldDeployWithoutALB: !And
    - !Condition ShouldDeployApplication
    - !Not [!Condition ShouldEnableALBController]
  HasIngress: !Equals [!Ref EnableIngress, "true"]
  HasCertificate: !Not [!Equals [!Ref IngressCertificateArn, ""]]

Resources:
  # =============================================================================
  # VPC STACK
  # =============================================================================
  VPCStack:
    Type: AWS::CloudFormation::Stack
    Condition: CreateNewCluster
    Properties:
      TemplateURL: !Sub "https://${MPS3BucketName}.s3.${MPS3BucketRegion}.${AWS::URLSuffix}/${MPS3KeyPrefix}vpc.yaml"
      Parameters:
        ProjectName: !Ref AWS::StackName
        EnvironmentName: !Ref EnvironmentName
        VpcCIDR: !Ref VpcCIDR
        AvailabilityZone1: !Ref AvailabilityZone1
        AvailabilityZone2: !Ref AvailabilityZone2
        AvailabilityZone3: !Ref AvailabilityZone3
        EnableFlowLogs: !Ref EnableFlowLogs
        FlowLogsRetentionDays: !Ref FlowLogsRetentionDays
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-vpc-stack"
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: ManagedBy
          Value: CloudFormation

  # =============================================================================
  # RDS STACK
  # =============================================================================
  RDSStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub "https://${MPS3BucketName}.s3.${MPS3BucketRegion}.${AWS::URLSuffix}/${MPS3KeyPrefix}rds.yaml"
      Parameters:
        ProjectName: !Ref AWS::StackName
        EnvironmentName: !Ref EnvironmentName
        VpcId: !If [CreateNewCluster, !GetAtt VPCStack.Outputs.VpcId, !Ref ExistingVpcId]
        VpcCIDR: !Ref VpcCIDR
        DatabaseSubnetIds: !If [CreateNewCluster, !GetAtt VPCStack.Outputs.DatabaseSubnetIds, !Ref ExistingPrivateSubnetIds]
        InstanceClass: !Ref RDSInstanceClass
        AllocatedStorage: !Ref RDSAllocatedStorage
        MaxAllocatedStorage: !Ref RDSMaxAllocatedStorage
        StorageType: !Ref RDSStorageType
        Iops: !Ref RDSIops
        DatabaseName: !Ref RDSDatabaseName
        MasterUsername: !Ref RDSMasterUsername
        CreateReadReplica: !Ref CreateReadReplica
        ForceSSL: !Ref RDSForceSSL
        MultiAZ: !Ref RDSMultiAZ
        DeletionProtection: !Ref RDSDeletionProtection
        BackupRetentionPeriod: !Ref RDSBackupRetentionPeriod
        AdditionalIngressCIDR1: !Ref AdditionalIngressCIDR1
        AdditionalIngressCIDR2: !Ref AdditionalIngressCIDR2
        AdditionalIngressCIDR3: !Ref AdditionalIngressCIDR3
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-rds-stack"
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: ManagedBy
          Value: CloudFormation

  # =============================================================================
  # DOCUMENTDB STACK
  # =============================================================================
  DocumentDBStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub "https://${MPS3BucketName}.s3.${MPS3BucketRegion}.${AWS::URLSuffix}/${MPS3KeyPrefix}documentdb.yaml"
      Parameters:
        ProjectName: !Ref AWS::StackName
        EnvironmentName: !Ref EnvironmentName
        VpcId: !If [CreateNewCluster, !GetAtt VPCStack.Outputs.VpcId, !Ref ExistingVpcId]
        VpcCIDR: !Ref VpcCIDR
        PrivateSubnetIds: !If [CreateNewCluster, !GetAtt VPCStack.Outputs.PrivateSubnetIds, !Ref ExistingPrivateSubnetIds]
        InstanceClass: !Ref DocumentDBInstanceClass
        InstanceCount: !Ref DocumentDBInstanceCount
        MasterUsername: !Ref DocumentDBMasterUsername
        DeletionProtection: !Ref DocumentDBDeletionProtection
        BackupRetentionPeriod: !Ref DocumentDBBackupRetentionPeriod
        AdditionalIngressCIDR1: !Ref AdditionalIngressCIDR1
        AdditionalIngressCIDR2: !Ref AdditionalIngressCIDR2
        AdditionalIngressCIDR3: !Ref AdditionalIngressCIDR3
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-documentdb-stack"
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: ManagedBy
          Value: CloudFormation

  # =============================================================================
  # ELASTICACHE STACK
  # =============================================================================
  ElastiCacheStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub "https://${MPS3BucketName}.s3.${MPS3BucketRegion}.${AWS::URLSuffix}/${MPS3KeyPrefix}elasticache.yaml"
      Parameters:
        ProjectName: !Ref AWS::StackName
        EnvironmentName: !Ref EnvironmentName
        VpcId: !If [CreateNewCluster, !GetAtt VPCStack.Outputs.VpcId, !Ref ExistingVpcId]
        VpcCIDR: !Ref VpcCIDR
        CacheSubnetIds: !If [CreateNewCluster, !GetAtt VPCStack.Outputs.DatabaseSubnetIds, !Ref ExistingPrivateSubnetIds]
        NodeType: !Ref ElastiCacheNodeType
        AdditionalIngressCIDR1: !Ref AdditionalIngressCIDR1
        AdditionalIngressCIDR2: !Ref AdditionalIngressCIDR2
        AdditionalIngressCIDR3: !Ref AdditionalIngressCIDR3
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-elasticache-stack"
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: ManagedBy
          Value: CloudFormation

  # =============================================================================
  # AMAZONMQ STACK
  # =============================================================================
  AmazonMQStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub "https://${MPS3BucketName}.s3.${MPS3BucketRegion}.${AWS::URLSuffix}/${MPS3KeyPrefix}amazonmq.yaml"
      Parameters:
        ProjectName: !Ref AWS::StackName
        EnvironmentName: !Ref EnvironmentName
        VpcId: !If [CreateNewCluster, !GetAtt VPCStack.Outputs.VpcId, !Ref ExistingVpcId]
        VpcCIDR: !Ref VpcCIDR
        PrivateSubnetIds: !If [CreateNewCluster, !GetAtt VPCStack.Outputs.PrivateSubnetIds, !Ref ExistingPrivateSubnetIds]
        InstanceType: !Ref AmazonMQInstanceType
        DeploymentMode: !Ref AmazonMQDeploymentMode
        AdminUsername: !Ref AmazonMQAdminUsername
        AdditionalIngressCIDR1: !Ref AdditionalIngressCIDR1
        AdditionalIngressCIDR2: !Ref AdditionalIngressCIDR2
        AdditionalIngressCIDR3: !Ref AdditionalIngressCIDR3
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-amazonmq-stack"
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: ManagedBy
          Value: CloudFormation

  # =============================================================================
  # EKS STACK
  # =============================================================================
  EKSStack:
    Type: AWS::CloudFormation::Stack
    Condition: CreateNewCluster
    DependsOn:
      - RDSStack
      - DocumentDBStack
      - ElastiCacheStack
      - AmazonMQStack
    Properties:
      TemplateURL: !Sub "https://${MPS3BucketName}.s3.${MPS3BucketRegion}.${AWS::URLSuffix}/${MPS3KeyPrefix}eks.yaml"
      Parameters:
        ProjectName: !Ref AWS::StackName
        EnvironmentName: !Ref EnvironmentName
        VpcId: !GetAtt VPCStack.Outputs.VpcId
        PrivateSubnetIds: !GetAtt VPCStack.Outputs.PrivateSubnetIds
        KubernetesVersion: !Ref KubernetesVersion
        NodeInstanceType: !Ref NodeInstanceType
        NodeGroupMinSize: !Ref NodeGroupMinSize
        NodeGroupMaxSize: !Ref NodeGroupMaxSize
        NodeGroupDesiredSize: !Ref NodeGroupDesiredSize
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-eks-stack"
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: ManagedBy
          Value: CloudFormation

  # =============================================================================
  # ROUTE53 STACK (Private Hosted Zone)
  # =============================================================================
  Route53Stack:
    Type: AWS::CloudFormation::Stack
    Condition: HasDomainName
    Properties:
      TemplateURL: !Sub "https://${MPS3BucketName}.s3.${MPS3BucketRegion}.${AWS::URLSuffix}/${MPS3KeyPrefix}route53.yaml"
      Parameters:
        ProjectName: !Ref AWS::StackName
        EnvironmentName: !Ref EnvironmentName
        DomainName: !Ref DomainName
        VpcId: !If [CreateNewCluster, !GetAtt VPCStack.Outputs.VpcId, !Ref ExistingVpcId]
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-route53-stack"
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: ManagedBy
          Value: CloudFormation

  # =============================================================================
  # ALB CONTROLLER STACK
  # =============================================================================
  ALBControllerStack:
    Type: AWS::CloudFormation::Stack
    Condition: ShouldEnableALBController
    Properties:
      TemplateURL: !Sub "https://${MPS3BucketName}.s3.${MPS3BucketRegion}.${AWS::URLSuffix}/${MPS3KeyPrefix}alb-controller.yaml"
      Parameters:
        ProjectName: !Ref AWS::StackName
        EnvironmentName: !Ref EnvironmentName
        VpcId: !If [CreateNewCluster, !GetAtt VPCStack.Outputs.VpcId, !Ref ExistingVpcId]
        ClusterName: !If [CreateNewCluster, !GetAtt EKSStack.Outputs.ClusterName, !Ref ExistingClusterName]
        OIDCProviderArn: !If [CreateNewCluster, !GetAtt EKSStack.Outputs.OIDCProviderArn, !Ref ExistingOIDCProviderArn]
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-alb-controller-stack"
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: ManagedBy
          Value: CloudFormation

  # =============================================================================
  # EXTERNAL DNS STACK
  # =============================================================================
  ExternalDNSStack:
    Type: AWS::CloudFormation::Stack
    Condition: ShouldEnableExternalDNS
    DependsOn: Route53Stack
    Properties:
      TemplateURL: !Sub "https://${MPS3BucketName}.s3.${MPS3BucketRegion}.${AWS::URLSuffix}/${MPS3KeyPrefix}external-dns.yaml"
      Parameters:
        ProjectName: !Ref AWS::StackName
        EnvironmentName: !Ref EnvironmentName
        ClusterName: !If [CreateNewCluster, !GetAtt EKSStack.Outputs.ClusterName, !Ref ExistingClusterName]
        OIDCProviderArn: !If [CreateNewCluster, !GetAtt EKSStack.Outputs.OIDCProviderArn, !Ref ExistingOIDCProviderArn]
        PrivateHostedZoneId: !GetAtt Route53Stack.Outputs.PrivateHostedZoneId
        DomainName: !Ref DomainName
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-external-dns-stack"
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: ManagedBy
          Value: CloudFormation

  # =============================================================================
  # MIDAZ APPLICATION (HELM DEPLOYMENT)
  # With ALB Controller dependency (when ALB Controller is enabled)
  # =============================================================================
  MidazHelmStack:
    Type: AWS::CloudFormation::Stack
    Condition: ShouldDeployWithALB
    DependsOn:
      - RDSStack
      - DocumentDBStack
      - ElastiCacheStack
      - AmazonMQStack
      - ALBControllerStack
    Properties:
      TemplateURL: !Sub "https://${MPS3BucketName}.s3.${MPS3BucketRegion}.${AWS::URLSuffix}/${MPS3KeyPrefix}products/midaz/helm.yaml"
      Parameters:
        ProjectName: !Ref AWS::StackName
        EnvironmentName: !Ref EnvironmentName
        ClusterName: !If [CreateNewCluster, !GetAtt EKSStack.Outputs.ClusterName, !Ref ExistingClusterName]
        VpcId: !If [CreateNewCluster, !GetAtt VPCStack.Outputs.VpcId, !Ref ExistingVpcId]
        PrivateSubnetIds: !If [CreateNewCluster, !GetAtt VPCStack.Outputs.PrivateSubnetIds, !Ref ExistingPrivateSubnetIds]
        # Database connections
        RDSEndpoint: !GetAtt RDSStack.Outputs.Endpoint
        RDSSecretArn: !GetAtt RDSStack.Outputs.SecretArn
        DocumentDBEndpoint: !GetAtt DocumentDBStack.Outputs.ClusterEndpoint
        DocumentDBSecretArn: !GetAtt DocumentDBStack.Outputs.SecretArn
        ElastiCacheEndpoint: !GetAtt ElastiCacheStack.Outputs.PrimaryEndpoint
        ElastiCacheSecretArn: !GetAtt ElastiCacheStack.Outputs.AuthSecretArn
        AmazonMQEndpoint: !GetAtt AmazonMQStack.Outputs.BrokerEndpoint
        AmazonMQSecretArn: !GetAtt AmazonMQStack.Outputs.SecretArn
        # KMS keys for secret decryption
        RDSKMSKeyArn: !GetAtt RDSStack.Outputs.KMSKeyArn
        DocumentDBKMSKeyArn: !GetAtt DocumentDBStack.Outputs.KMSKeyArn
        ElastiCacheKMSKeyArn: !GetAtt ElastiCacheStack.Outputs.KMSKeyArn
        AmazonMQKMSKeyArn: !GetAtt AmazonMQStack.Outputs.KMSKeyArn
        # Ledger configuration
        MidazChartVersion: !Ref MidazVersion
        # Domain (host principal)
        DomainName: !Ref DomainName
        # Ledger Ingress
        EnableIngress: !Ref EnableIngress
        IngressHostname: !Ref IngressHostname
        IngressScheme: "internal"
        IngressCertificateArn: !Ref IngressCertificateArn
        # CRM configuration
        EnableCRM: !Ref EnableCRM
        # CRM Ingress
        EnableCRMIngress: !Ref EnableCRMIngress
        CRMIngressHostname: !Ref CRMIngressHostname
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-midaz-app-stack"
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: ManagedBy
          Value: CloudFormation

  # =============================================================================
  # MIDAZ APPLICATION (HELM DEPLOYMENT)
  # Without ALB Controller dependency (when ALB Controller is disabled)
  # =============================================================================
  MidazHelmStackNoALB:
    Type: AWS::CloudFormation::Stack
    Condition: ShouldDeployWithoutALB
    DependsOn:
      - RDSStack
      - DocumentDBStack
      - ElastiCacheStack
      - AmazonMQStack
    Properties:
      TemplateURL: !Sub "https://${MPS3BucketName}.s3.${MPS3BucketRegion}.${AWS::URLSuffix}/${MPS3KeyPrefix}products/midaz/helm.yaml"
      Parameters:
        ProjectName: !Ref AWS::StackName
        EnvironmentName: !Ref EnvironmentName
        ClusterName: !If [CreateNewCluster, !GetAtt EKSStack.Outputs.ClusterName, !Ref ExistingClusterName]
        VpcId: !If [CreateNewCluster, !GetAtt VPCStack.Outputs.VpcId, !Ref ExistingVpcId]
        PrivateSubnetIds: !If [CreateNewCluster, !GetAtt VPCStack.Outputs.PrivateSubnetIds, !Ref ExistingPrivateSubnetIds]
        # Database connections
        RDSEndpoint: !GetAtt RDSStack.Outputs.Endpoint
        RDSSecretArn: !GetAtt RDSStack.Outputs.SecretArn
        DocumentDBEndpoint: !GetAtt DocumentDBStack.Outputs.ClusterEndpoint
        DocumentDBSecretArn: !GetAtt DocumentDBStack.Outputs.SecretArn
        ElastiCacheEndpoint: !GetAtt ElastiCacheStack.Outputs.PrimaryEndpoint
        ElastiCacheSecretArn: !GetAtt ElastiCacheStack.Outputs.AuthSecretArn
        AmazonMQEndpoint: !GetAtt AmazonMQStack.Outputs.BrokerEndpoint
        AmazonMQSecretArn: !GetAtt AmazonMQStack.Outputs.SecretArn
        # KMS keys for secret decryption
        RDSKMSKeyArn: !GetAtt RDSStack.Outputs.KMSKeyArn
        DocumentDBKMSKeyArn: !GetAtt DocumentDBStack.Outputs.KMSKeyArn
        ElastiCacheKMSKeyArn: !GetAtt ElastiCacheStack.Outputs.KMSKeyArn
        AmazonMQKMSKeyArn: !GetAtt AmazonMQStack.Outputs.KMSKeyArn
        # Ledger configuration
        MidazChartVersion: !Ref MidazVersion
        # Domain (host principal)
        DomainName: !Ref DomainName
        # Ledger Ingress
        EnableIngress: !Ref EnableIngress
        IngressHostname: !Ref IngressHostname
        IngressScheme: "internal"
        IngressCertificateArn: !Ref IngressCertificateArn
        # CRM configuration
        EnableCRM: !Ref EnableCRM
        # CRM Ingress
        EnableCRMIngress: !Ref EnableCRMIngress
        CRMIngressHostname: !Ref CRMIngressHostname
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-midaz-app-stack"
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: ManagedBy
          Value: CloudFormation

Outputs:
  # =============================================================================
  # STACK METADATA (for application stack reference)
  # =============================================================================
  ProjectName:
    Description: Project name used in this deployment (stack name)
    Value: !Ref AWS::StackName
    Export:
      Name: !Sub "${AWS::StackName}-ProjectName"

  EnvironmentName:
    Description: Environment name
    Value: !Ref EnvironmentName
    Export:
      Name: !Sub "${AWS::StackName}-EnvironmentName"

  # =============================================================================
  # VPC OUTPUTS
  # =============================================================================
  VpcId:
    Description: VPC ID
    Value: !If [CreateNewCluster, !GetAtt VPCStack.Outputs.VpcId, !Ref ExistingVpcId]
    Export:
      Name: !Sub "${AWS::StackName}-VpcId"

  PrivateSubnetIds:
    Description: Private Subnet IDs
    Value: !If [CreateNewCluster, !GetAtt VPCStack.Outputs.PrivateSubnetIds, !Ref ExistingPrivateSubnetIds]
    Export:
      Name: !Sub "${AWS::StackName}-PrivateSubnetIds"

  # =============================================================================
  # EKS OUTPUTS
  # =============================================================================
  EKSClusterName:
    Description: EKS Cluster Name
    Value: !If [CreateNewCluster, !GetAtt EKSStack.Outputs.ClusterName, !Ref ExistingClusterName]
    Export:
      Name: !Sub "${AWS::StackName}-EKSClusterName"

  EKSClusterEndpoint:
    Condition: CreateNewCluster
    Description: EKS Cluster Endpoint
    Value: !GetAtt EKSStack.Outputs.ClusterEndpoint
    Export:
      Name: !Sub "${AWS::StackName}-EKSClusterEndpoint"

  OIDCProviderArn:
    Description: EKS OIDC Provider ARN
    Value: !If [CreateNewCluster, !GetAtt EKSStack.Outputs.OIDCProviderArn, !Ref ExistingOIDCProviderArn]
    Export:
      Name: !Sub "${AWS::StackName}-OIDCProviderArn"

  # =============================================================================
  # RDS OUTPUTS
  # =============================================================================
  RDSEndpoint:
    Description: RDS Primary Endpoint
    Value: !GetAtt RDSStack.Outputs.Endpoint
    Export:
      Name: !Sub "${AWS::StackName}-RDSEndpoint"

  RDSSecretArn:
    Description: RDS Password Secret ARN
    Value: !GetAtt RDSStack.Outputs.SecretArn
    Export:
      Name: !Sub "${AWS::StackName}-RDSSecretArn"

  # =============================================================================
  # DOCUMENTDB OUTPUTS
  # =============================================================================
  DocumentDBEndpoint:
    Description: DocumentDB Cluster Endpoint
    Value: !GetAtt DocumentDBStack.Outputs.ClusterEndpoint
    Export:
      Name: !Sub "${AWS::StackName}-DocumentDBEndpoint"

  DocumentDBSecretArn:
    Description: DocumentDB Password Secret ARN
    Value: !GetAtt DocumentDBStack.Outputs.SecretArn
    Export:
      Name: !Sub "${AWS::StackName}-DocumentDBSecretArn"

  # =============================================================================
  # ELASTICACHE OUTPUTS
  # =============================================================================
  ElastiCacheEndpoint:
    Description: ElastiCache Primary Endpoint
    Value: !GetAtt ElastiCacheStack.Outputs.PrimaryEndpoint
    Export:
      Name: !Sub "${AWS::StackName}-ElastiCacheEndpoint"

  # =============================================================================
  # AMAZONMQ OUTPUTS
  # =============================================================================
  AmazonMQEndpoint:
    Description: AmazonMQ Broker Endpoint
    Value: !GetAtt AmazonMQStack.Outputs.BrokerEndpoint
    Export:
      Name: !Sub "${AWS::StackName}-AmazonMQEndpoint"

  AmazonMQSecretArn:
    Description: AmazonMQ Password Secret ARN
    Value: !GetAtt AmazonMQStack.Outputs.SecretArn
    Export:
      Name: !Sub "${AWS::StackName}-AmazonMQSecretArn"

  # =============================================================================
  # ROUTE53 OUTPUTS
  # =============================================================================
  PrivateHostedZoneId:
    Condition: HasDomainName
    Description: Route53 Private Hosted Zone ID
    Value: !GetAtt Route53Stack.Outputs.PrivateHostedZoneId
    Export:
      Name: !Sub "${AWS::StackName}-PrivateHostedZoneId"

  PrivateHostedZoneName:
    Condition: HasDomainName
    Description: Route53 Private Hosted Zone Name
    Value: !GetAtt Route53Stack.Outputs.PrivateHostedZoneName
    Export:
      Name: !Sub "${AWS::StackName}-PrivateHostedZoneName"

  # =============================================================================
  # ALB CONTROLLER OUTPUTS
  # =============================================================================
  ALBControllerRoleArn:
    Condition: ShouldEnableALBController
    Description: ALB Controller IAM Role ARN
    Value: !GetAtt ALBControllerStack.Outputs.ALBControllerRoleArn
    Export:
      Name: !Sub "${AWS::StackName}-ALBControllerRoleArn"

  # =============================================================================
  # EXTERNAL DNS OUTPUTS
  # =============================================================================
  ExternalDNSRoleArn:
    Condition: ShouldEnableExternalDNS
    Description: ExternalDNS IAM Role ARN
    Value: !GetAtt ExternalDNSStack.Outputs.ExternalDNSRoleArn
    Export:
      Name: !Sub "${AWS::StackName}-ExternalDNSRoleArn"

  # =============================================================================
  # MIDAZ APPLICATION OUTPUTS
  # =============================================================================
  MidazNamespace:
    Condition: ShouldDeployApplication
    Description: Kubernetes namespace where Midaz is deployed
    Value: !If
      - ShouldDeployWithALB
      - !GetAtt MidazHelmStack.Outputs.HelmNamespace
      - !GetAtt MidazHelmStackNoALB.Outputs.HelmNamespace
    Export:
      Name: !Sub "${AWS::StackName}-MidazNamespace"

  MidazAPIEndpoint:
    Condition: ShouldDeployApplication
    Description: Midaz Ledger API endpoint
    Value: !If
      - ShouldDeployWithALB
      - !GetAtt MidazHelmStack.Outputs.LedgerAPIEndpoint
      - !GetAtt MidazHelmStackNoALB.Outputs.LedgerAPIEndpoint
    Export:
      Name: !Sub "${AWS::StackName}-MidazAPIEndpoint"

  # =============================================================================
  # UTILITY COMMANDS
  # =============================================================================
  KubeconfigCommand:
    Description: Command to configure kubectl
    Value: !Sub
      - "aws eks update-kubeconfig --name ${ClusterName} --region ${AWS::Region}"
      - ClusterName: !If [CreateNewCluster, !GetAtt EKSStack.Outputs.ClusterName, !Ref ExistingClusterName]

  CheckMidazPodsCommand:
    Condition: ShouldDeployApplication
    Description: Command to check Midaz pods status
    Value: "kubectl get pods -n midaz"
