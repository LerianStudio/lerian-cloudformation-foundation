AWSTemplateFormatVersion: '2010-09-09'
Description: AmazonMQ (RabbitMQ) Stack for Midaz Platform

Parameters:
  ProjectName:
    Type: String
    Description: Project name for resource naming
    AllowedPattern: "^[a-zA-Z][a-zA-Z0-9-]*$"
    ConstraintDescription: "Must begin with a letter and contain only letters, numbers, and hyphens"

  EnvironmentName:
    Type: String
    Description: Environment name for tagging
    AllowedValues:
      - development
      - staging
      - production

  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC ID

  VpcCIDR:
    Type: String
    Description: VPC CIDR block for security group rules
    AllowedPattern: "^(([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])\\.){3}([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])(\\/([0-9]|[1-2][0-9]|3[0-2]))$"
    ConstraintDescription: "Must be a valid CIDR block (e.g., 10.0.0.0/16)"

  PrivateSubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: Private subnet IDs (1 for single-instance, 3 for cluster deployment)

  InstanceType:
    Type: String
    Description: AmazonMQ broker instance type
    AllowedValues:
      - mq.t3.micro
      - mq.m5.large
      - mq.m5.xlarge
      - mq.m5.2xlarge
      - mq.m5.4xlarge
      - mq.m7g.large
      - mq.m7g.xlarge
      - mq.m7g.2xlarge
      - mq.m7g.4xlarge
      - mq.m7g.8xlarge
      - mq.m7g.12xlarge
      - mq.m7g.16xlarge

  DeploymentMode:
    Type: String
    Description: Broker deployment mode. CLUSTER_MULTI_AZ deploys 3 nodes across AZs for HA.
    Default: SINGLE_INSTANCE
    AllowedValues:
      - SINGLE_INSTANCE
      - CLUSTER_MULTI_AZ

  AdminUsername:
    Type: String
    Description: Admin username (sensitive)
    NoEcho: true
    AllowedPattern: "^[a-zA-Z][a-zA-Z0-9_]*$"
    MinLength: 1
    MaxLength: 100
    ConstraintDescription: "Must begin with a letter and contain only alphanumeric characters and underscores"

  AdditionalIngressCIDR1:
    Type: String
    Default: ""
    Description: "Additional CIDR block for resource access (e.g., VPN, VPC peering). Leave empty to skip."
    AllowedPattern: "^$|^(([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])\\.){3}([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])(\\/([0-9]|[1-2][0-9]|3[0-2]))$"
    ConstraintDescription: "Must be a valid CIDR block or empty"

  AdditionalIngressCIDR2:
    Type: String
    Default: ""
    Description: "Additional CIDR block for resource access (e.g., VPN, VPC peering). Leave empty to skip."
    AllowedPattern: "^$|^(([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])\\.){3}([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])(\\/([0-9]|[1-2][0-9]|3[0-2]))$"
    ConstraintDescription: "Must be a valid CIDR block or empty"

  AdditionalIngressCIDR3:
    Type: String
    Default: ""
    Description: "Additional CIDR block for resource access (e.g., VPN, VPC peering). Leave empty to skip."
    AllowedPattern: "^$|^(([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])\\.){3}([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])(\\/([0-9]|[1-2][0-9]|3[0-2]))$"
    ConstraintDescription: "Must be a valid CIDR block or empty"

Conditions:
  IsClusterDeployment: !Equals [!Ref DeploymentMode, "CLUSTER_MULTI_AZ"]
  HasAdditionalCIDR1: !And
    - !Not [!Equals [!Ref AdditionalIngressCIDR1, ""]]
    - !Not [!Equals [!Ref AdditionalIngressCIDR1, !Ref VpcCIDR]]
  HasAdditionalCIDR2: !And
    - !Not [!Equals [!Ref AdditionalIngressCIDR2, ""]]
    - !Not [!Equals [!Ref AdditionalIngressCIDR2, !Ref VpcCIDR]]
    - !Not [!Equals [!Ref AdditionalIngressCIDR2, !Ref AdditionalIngressCIDR1]]
  HasAdditionalCIDR3: !And
    - !Not [!Equals [!Ref AdditionalIngressCIDR3, ""]]
    - !Not [!Equals [!Ref AdditionalIngressCIDR3, !Ref VpcCIDR]]
    - !Not [!Equals [!Ref AdditionalIngressCIDR3, !Ref AdditionalIngressCIDR1]]
    - !Not [!Equals [!Ref AdditionalIngressCIDR3, !Ref AdditionalIngressCIDR2]]

Resources:
  # =============================================================================
  # SECRETS
  # =============================================================================
  AmazonMQSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "${ProjectName}/amazonmq-password"
      Description: AmazonMQ Admin Password
      GenerateSecretString:
        SecretStringTemplate: !Sub '{"username": "${AdminUsername}"}'
        GenerateStringKey: password
        PasswordLength: 16
        ExcludePunctuation: true
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-amazonmq-secret"
        - Key: Environment
          Value: !Ref EnvironmentName

  # =============================================================================
  # SECURITY GROUP
  # =============================================================================
  AmazonMQSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub "${ProjectName}-amazonmq-sg"
      GroupDescription: Security group for AmazonMQ
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 5671
          ToPort: 5671
          CidrIp: !Ref VpcCIDR
          Description: AMQPS from VPC
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: !Ref VpcCIDR
          Description: HTTPS Management Console from VPC
        - IpProtocol: tcp
          FromPort: 15671
          ToPort: 15671
          CidrIp: !Ref VpcCIDR
          Description: RabbitMQ Management Plugin from VPC
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-amazonmq-sg"
        - Key: Environment
          Value: !Ref EnvironmentName

  # =============================================================================
  # ADDITIONAL NETWORK ACCESS (Conditional)
  # =============================================================================
  AdditionalIngressAmqps1:
    Type: AWS::EC2::SecurityGroupIngress
    Condition: HasAdditionalCIDR1
    Properties:
      GroupId: !Ref AmazonMQSecurityGroup
      IpProtocol: tcp
      FromPort: 5671
      ToPort: 5671
      CidrIp: !Ref AdditionalIngressCIDR1
      Description: "Additional AMQPS access 1"

  AdditionalIngressAmqps2:
    Type: AWS::EC2::SecurityGroupIngress
    Condition: HasAdditionalCIDR2
    Properties:
      GroupId: !Ref AmazonMQSecurityGroup
      IpProtocol: tcp
      FromPort: 5671
      ToPort: 5671
      CidrIp: !Ref AdditionalIngressCIDR2
      Description: "Additional AMQPS access 2"

  AdditionalIngressAmqps3:
    Type: AWS::EC2::SecurityGroupIngress
    Condition: HasAdditionalCIDR3
    Properties:
      GroupId: !Ref AmazonMQSecurityGroup
      IpProtocol: tcp
      FromPort: 5671
      ToPort: 5671
      CidrIp: !Ref AdditionalIngressCIDR3
      Description: "Additional AMQPS access 3"

  AdditionalIngressHttps1:
    Type: AWS::EC2::SecurityGroupIngress
    Condition: HasAdditionalCIDR1
    Properties:
      GroupId: !Ref AmazonMQSecurityGroup
      IpProtocol: tcp
      FromPort: 443
      ToPort: 443
      CidrIp: !Ref AdditionalIngressCIDR1
      Description: "Additional HTTPS access 1"

  AdditionalIngressHttps2:
    Type: AWS::EC2::SecurityGroupIngress
    Condition: HasAdditionalCIDR2
    Properties:
      GroupId: !Ref AmazonMQSecurityGroup
      IpProtocol: tcp
      FromPort: 443
      ToPort: 443
      CidrIp: !Ref AdditionalIngressCIDR2
      Description: "Additional HTTPS access 2"

  AdditionalIngressHttps3:
    Type: AWS::EC2::SecurityGroupIngress
    Condition: HasAdditionalCIDR3
    Properties:
      GroupId: !Ref AmazonMQSecurityGroup
      IpProtocol: tcp
      FromPort: 443
      ToPort: 443
      CidrIp: !Ref AdditionalIngressCIDR3
      Description: "Additional HTTPS access 3"

  AdditionalIngressMgmt1:
    Type: AWS::EC2::SecurityGroupIngress
    Condition: HasAdditionalCIDR1
    Properties:
      GroupId: !Ref AmazonMQSecurityGroup
      IpProtocol: tcp
      FromPort: 15671
      ToPort: 15671
      CidrIp: !Ref AdditionalIngressCIDR1
      Description: "Additional management access 1"

  AdditionalIngressMgmt2:
    Type: AWS::EC2::SecurityGroupIngress
    Condition: HasAdditionalCIDR2
    Properties:
      GroupId: !Ref AmazonMQSecurityGroup
      IpProtocol: tcp
      FromPort: 15671
      ToPort: 15671
      CidrIp: !Ref AdditionalIngressCIDR2
      Description: "Additional management access 2"

  AdditionalIngressMgmt3:
    Type: AWS::EC2::SecurityGroupIngress
    Condition: HasAdditionalCIDR3
    Properties:
      GroupId: !Ref AmazonMQSecurityGroup
      IpProtocol: tcp
      FromPort: 15671
      ToPort: 15671
      CidrIp: !Ref AdditionalIngressCIDR3
      Description: "Additional management access 3"

  # =============================================================================
  # CLOUDWATCH LOG GROUP
  # =============================================================================
  AmazonMQLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/amazonmq/${ProjectName}"
      RetentionInDays: 30

  # =============================================================================
  # AMAZONMQ BROKER
  # =============================================================================
  AmazonMQBroker:
    Type: AWS::AmazonMQ::Broker
    Properties:
      BrokerName: !Sub "${ProjectName}-rabbitmq"
      EngineType: RABBITMQ
      EngineVersion: "3.13"
      HostInstanceType: !Ref InstanceType
      DeploymentMode: !Ref DeploymentMode
      PubliclyAccessible: false
      AutoMinorVersionUpgrade: true
      SubnetIds: !If
        - IsClusterDeployment
        - !Ref PrivateSubnetIds
        - - !Select [0, !Ref PrivateSubnetIds]
      SecurityGroups:
        - !Ref AmazonMQSecurityGroup
      Users:
        - Username: !Sub "{{resolve:secretsmanager:${AmazonMQSecret}:SecretString:username}}"
          Password: !Sub "{{resolve:secretsmanager:${AmazonMQSecret}:SecretString:password}}"
      Logs:
        General: true
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-rabbitmq"
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: ManagedBy
          Value: CloudFormation

Outputs:
  BrokerId:
    Description: AmazonMQ Broker ID
    Value: !Ref AmazonMQBroker

  BrokerArn:
    Description: AmazonMQ Broker ARN
    Value: !GetAtt AmazonMQBroker.Arn

  BrokerEndpoint:
    Description: AmazonMQ Broker AMQP Endpoint
    Value: !Select [0, !GetAtt AmazonMQBroker.AmqpEndpoints]

  ConsoleURL:
    Description: AmazonMQ Management Console URL
    Value: !Sub "https://${AmazonMQBroker}.mq.${AWS::Region}.on.aws"

  SecretArn:
    Description: AmazonMQ Password Secret ARN
    Value: !Ref AmazonMQSecret

  SecurityGroupId:
    Description: AmazonMQ Security Group ID
    Value: !Ref AmazonMQSecurityGroup

