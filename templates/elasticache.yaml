AWSTemplateFormatVersion: '2010-09-09'
Description: ElastiCache (Valkey/Redis) Stack for Midaz Platform

Parameters:
  ProjectName:
    Type: String
    Description: Project name for resource naming
    AllowedPattern: "^[a-zA-Z][a-zA-Z0-9-]*$"
    ConstraintDescription: "Must begin with a letter and contain only letters, numbers, and hyphens"

  EnvironmentName:
    Type: String
    Description: Environment name for tagging
    AllowedValues:
      - development
      - staging
      - production

  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC ID

  VpcCIDR:
    Type: String
    Description: VPC CIDR block for security group rules
    AllowedPattern: "^(([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])\\.){3}([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])(\\/([0-9]|[1-2][0-9]|3[0-2]))$"
    ConstraintDescription: "Must be a valid CIDR block (e.g., 10.0.0.0/16)"

  CacheSubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: Cache subnet IDs

  NodeType:
    Type: String
    Description: ElastiCache node type
    AllowedValues:
      - cache.t3.micro
      - cache.t3.small
      - cache.t3.medium
      - cache.m7g.large
      - cache.m7g.xlarge
      - cache.r7g.large
      - cache.r7g.xlarge

  AdditionalIngressCIDR1:
    Type: String
    Default: ""
    Description: "Additional CIDR block for resource access (e.g., VPN, VPC peering). Leave empty to skip."
    AllowedPattern: "^$|^(([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])\\.){3}([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])(\\/([0-9]|[1-2][0-9]|3[0-2]))$"
    ConstraintDescription: "Must be a valid CIDR block or empty"

  AdditionalIngressCIDR2:
    Type: String
    Default: ""
    Description: "Additional CIDR block for resource access (e.g., VPN, VPC peering). Leave empty to skip."
    AllowedPattern: "^$|^(([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])\\.){3}([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])(\\/([0-9]|[1-2][0-9]|3[0-2]))$"
    ConstraintDescription: "Must be a valid CIDR block or empty"

  AdditionalIngressCIDR3:
    Type: String
    Default: ""
    Description: "Additional CIDR block for resource access (e.g., VPN, VPC peering). Leave empty to skip."
    AllowedPattern: "^$|^(([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])\\.){3}([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])(\\/([0-9]|[1-2][0-9]|3[0-2]))$"
    ConstraintDescription: "Must be a valid CIDR block or empty"

Conditions:
  HasAdditionalCIDR1: !And
    - !Not [!Equals [!Ref AdditionalIngressCIDR1, ""]]
    - !Not [!Equals [!Ref AdditionalIngressCIDR1, !Ref VpcCIDR]]
  HasAdditionalCIDR2: !And
    - !Not [!Equals [!Ref AdditionalIngressCIDR2, ""]]
    - !Not [!Equals [!Ref AdditionalIngressCIDR2, !Ref VpcCIDR]]
    - !Not [!Equals [!Ref AdditionalIngressCIDR2, !Ref AdditionalIngressCIDR1]]
  HasAdditionalCIDR3: !And
    - !Not [!Equals [!Ref AdditionalIngressCIDR3, ""]]
    - !Not [!Equals [!Ref AdditionalIngressCIDR3, !Ref VpcCIDR]]
    - !Not [!Equals [!Ref AdditionalIngressCIDR3, !Ref AdditionalIngressCIDR1]]
    - !Not [!Equals [!Ref AdditionalIngressCIDR3, !Ref AdditionalIngressCIDR2]]

Resources:
  # =============================================================================
  # KMS KEY
  # =============================================================================
  ElastiCacheKMSKey:
    Type: AWS::KMS::Key
    Properties:
      Description: KMS key for ElastiCache secrets encryption
      EnableKeyRotation: true
      KeyPolicy:
        Version: '2012-10-17'
        Statement:
          - Sid: Enable IAM User Permissions
            Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${AWS::AccountId}:root"
            Action: kms:*
            Resource: '*'
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-elasticache-kms"
        - Key: Environment
          Value: !Ref EnvironmentName

  ElastiCacheKMSKeyAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: !Sub "alias/${ProjectName}-elasticache"
      TargetKeyId: !Ref ElastiCacheKMSKey

  # =============================================================================
  # SECRETS
  # =============================================================================
  ElastiCacheAuthSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "${ProjectName}/elasticache-auth-token"
      Description: ElastiCache Auth Token for transit encryption
      KmsKeyId: !GetAtt ElastiCacheKMSKey.Arn
      GenerateSecretString:
        PasswordLength: 64
        ExcludeCharacters: '"@/\!'
        ExcludePunctuation: false
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-elasticache-auth-secret"
        - Key: Environment
          Value: !Ref EnvironmentName

  # =============================================================================
  # SECURITY GROUP
  # =============================================================================
  ElastiCacheSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub "${ProjectName}-elasticache-sg"
      GroupDescription: Security group for ElastiCache
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 6379
          ToPort: 6379
          CidrIp: !Ref VpcCIDR
          Description: Redis/Valkey from VPC
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-elasticache-sg"
        - Key: Environment
          Value: !Ref EnvironmentName

  # =============================================================================
  # ADDITIONAL NETWORK ACCESS (Conditional)
  # =============================================================================
  AdditionalIngress1:
    Type: AWS::EC2::SecurityGroupIngress
    Condition: HasAdditionalCIDR1
    Properties:
      GroupId: !Ref ElastiCacheSecurityGroup
      IpProtocol: tcp
      FromPort: 6379
      ToPort: 6379
      CidrIp: !Ref AdditionalIngressCIDR1
      Description: "Additional network access 1"

  AdditionalIngress2:
    Type: AWS::EC2::SecurityGroupIngress
    Condition: HasAdditionalCIDR2
    Properties:
      GroupId: !Ref ElastiCacheSecurityGroup
      IpProtocol: tcp
      FromPort: 6379
      ToPort: 6379
      CidrIp: !Ref AdditionalIngressCIDR2
      Description: "Additional network access 2"

  AdditionalIngress3:
    Type: AWS::EC2::SecurityGroupIngress
    Condition: HasAdditionalCIDR3
    Properties:
      GroupId: !Ref ElastiCacheSecurityGroup
      IpProtocol: tcp
      FromPort: 6379
      ToPort: 6379
      CidrIp: !Ref AdditionalIngressCIDR3
      Description: "Additional network access 3"

  # =============================================================================
  # SUBNET GROUP
  # =============================================================================
  ElastiCacheSubnetGroup:
    Type: AWS::ElastiCache::SubnetGroup
    Properties:
      CacheSubnetGroupName: !Sub "${ProjectName}-elasticache-subnet-group"
      Description: Subnet group for ElastiCache
      SubnetIds: !Ref CacheSubnetIds
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-elasticache-subnet-group"
        - Key: Environment
          Value: !Ref EnvironmentName

  # =============================================================================
  # PARAMETER GROUP
  # =============================================================================
  ElastiCacheParameterGroup:
    Type: AWS::ElastiCache::ParameterGroup
    Properties:
      CacheParameterGroupFamily: valkey7
      Description: Parameter group for Midaz ElastiCache
      Properties:
        latency-tracking: "yes"
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-elasticache-params"
        - Key: Environment
          Value: !Ref EnvironmentName

  # =============================================================================
  # ELASTICACHE REPLICATION GROUP
  # =============================================================================
  ElastiCacheReplicationGroup:
    Type: AWS::ElastiCache::ReplicationGroup
    Properties:
      ReplicationGroupId: !Sub "${ProjectName}-valkey"
      ReplicationGroupDescription: Valkey cluster for Midaz
      Engine: valkey
      EngineVersion: "7.2"
      CacheNodeType: !Ref NodeType
      NumCacheClusters: 2
      CacheSubnetGroupName: !Ref ElastiCacheSubnetGroup
      CacheParameterGroupName: !Ref ElastiCacheParameterGroup
      SecurityGroupIds:
        - !Ref ElastiCacheSecurityGroup
      AutomaticFailoverEnabled: true
      MultiAZEnabled: true
      TransitEncryptionEnabled: true
      TransitEncryptionMode: required
      AuthToken: !Sub "{{resolve:secretsmanager:${ElastiCacheAuthSecret}:SecretString}}"
      AtRestEncryptionEnabled: true
      AutoMinorVersionUpgrade: true
      PreferredMaintenanceWindow: "mon:00:00-mon:03:00"
      SnapshotRetentionLimit: 7
      SnapshotWindow: "05:00-09:00"
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-valkey"
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: ManagedBy
          Value: CloudFormation

Outputs:
  PrimaryEndpoint:
    Description: ElastiCache Primary Endpoint
    Value: !GetAtt ElastiCacheReplicationGroup.PrimaryEndPoint.Address

  PrimaryPort:
    Description: ElastiCache Primary Port
    Value: !GetAtt ElastiCacheReplicationGroup.PrimaryEndPoint.Port

  ReaderEndpoint:
    Description: ElastiCache Reader Endpoint
    Value: !GetAtt ElastiCacheReplicationGroup.ReaderEndPoint.Address

  AuthSecretArn:
    Description: ElastiCache Auth Token Secret ARN
    Value: !Ref ElastiCacheAuthSecret

  SecurityGroupId:
    Description: ElastiCache Security Group ID
    Value: !Ref ElastiCacheSecurityGroup

