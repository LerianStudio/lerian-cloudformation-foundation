AWSTemplateFormatVersion: '2010-09-09'
Description: |
  Foundation Infrastructure Stack
  Deploys shared VPC, EKS, and supporting services (Route53, ALB Controller, ExternalDNS).
  Product stacks receive this stack's outputs as parameters (ExistingVpcId, ExistingClusterName, etc.).
  (c) Lerian Studio - https://lerian.studio

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: "AWS Marketplace Configuration"
        Parameters:
          - MPS3BucketName
          - MPS3BucketRegion
          - MPS3KeyPrefix
      - Label:
          default: "General Configuration"
        Parameters:
          - EnvironmentName
          - ProjectName
      - Label:
          default: "Network Configuration"
        Parameters:
          - VpcCIDR
          - AvailabilityZone1
          - AvailabilityZone2
          - AvailabilityZone3
          - EnableFlowLogs
          - FlowLogsRetentionDays
      - Label:
          default: "EKS Configuration"
        Parameters:
          - KubernetesVersion
          - NodeInstanceType
          - NodeGroupMinSize
          - NodeGroupMaxSize
          - NodeGroupDesiredSize
      - Label:
          default: "DNS and Ingress Configuration"
        Parameters:
          - DomainName
          - EnableALBController
          - EnableExternalDNS
    ParameterLabels:
      # AWS Marketplace
      MPS3BucketName:
        default: "Template S3 Bucket Name"
      MPS3BucketRegion:
        default: "Template S3 Bucket Region"
      MPS3KeyPrefix:
        default: "Template S3 Key Prefix"
      # General
      EnvironmentName:
        default: "Environment"
      ProjectName:
        default: "Project Name"
      # Network
      VpcCIDR:
        default: "VPC CIDR Block"
      AvailabilityZone1:
        default: "Availability Zone 1"
      AvailabilityZone2:
        default: "Availability Zone 2"
      AvailabilityZone3:
        default: "Availability Zone 3"
      EnableFlowLogs:
        default: "Enable VPC Flow Logs"
      FlowLogsRetentionDays:
        default: "Flow Logs Retention (Days)"
      # EKS
      KubernetesVersion:
        default: "Kubernetes Version"
      NodeInstanceType:
        default: "Node Instance Type"
      NodeGroupMinSize:
        default: "Minimum Nodes"
      NodeGroupMaxSize:
        default: "Maximum Nodes"
      NodeGroupDesiredSize:
        default: "Desired Nodes"
      # DNS
      DomainName:
        default: "Domain Name (Optional)"
      EnableALBController:
        default: "Enable ALB Controller"
      EnableExternalDNS:
        default: "Enable ExternalDNS"

Parameters:
  # =============================================================================
  # AWS MARKETPLACE PARAMETERS (Required for Nested Stacks)
  # =============================================================================
  MPS3BucketName:
    Type: String
    Description: "S3 bucket name containing the CloudFormation templates (managed by AWS Marketplace)"
    Default: "lerian-cloudformation-foundation"

  MPS3BucketRegion:
    Type: String
    Description: "AWS Region where the S3 bucket is located (fixed to sa-east-1)"
    Default: "sa-east-1"
    AllowedValues:
      - sa-east-1

  MPS3KeyPrefix:
    Type: String
    Description: "S3 key prefix for the CloudFormation templates"
    Default: "releases/latest/"
    AllowedPattern: "^[a-zA-Z0-9-_./]*$"
    ConstraintDescription: "Key prefix can include alphanumeric characters, hyphens, underscores, periods, and forward slashes"

  # =============================================================================
  # GENERAL CONFIGURATION
  # =============================================================================
  EnvironmentName:
    Type: String
    Default: production
    AllowedValues:
      - development
      - staging
      - production
    Description: Environment name for resource tagging

  ProjectName:
    Type: String
    Default: lerian
    Description: Project name used for resource naming (shared across all products)
    AllowedPattern: "^[a-zA-Z][a-zA-Z0-9-]*$"
    MinLength: 3
    MaxLength: 128
    ConstraintDescription: "Must begin with a letter, contain only letters, numbers, and hyphens, and be 3-128 characters long"

  # Network
  VpcCIDR:
    Type: String
    Default: 10.50.0.0/16
    Description: CIDR block for the VPC
    AllowedPattern: ^(([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])\.){3}([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])(\/([0-9]|[1-2][0-9]|3[0-2]))$

  AvailabilityZone1:
    Type: AWS::EC2::AvailabilityZone::Name
    Default: us-east-2a
    Description: First Availability Zone

  AvailabilityZone2:
    Type: AWS::EC2::AvailabilityZone::Name
    Default: us-east-2b
    Description: Second Availability Zone

  AvailabilityZone3:
    Type: AWS::EC2::AvailabilityZone::Name
    Default: us-east-2c
    Description: Third Availability Zone

  EnableFlowLogs:
    Type: String
    AllowedValues:
      - "true"
      - "false"
    Default: "false"
    Description: Enable VPC Flow Logs for network traffic auditing and security analysis.

  FlowLogsRetentionDays:
    Type: Number
    Default: 14
    AllowedValues:
      - 1
      - 3
      - 5
      - 7
      - 14
      - 30
      - 60
      - 90
      - 120
      - 150
      - 180
      - 365
      - 400
      - 545
      - 731
      - 1827
      - 3653
    Description: Number of days to retain VPC Flow Logs in CloudWatch.

  # EKS
  KubernetesVersion:
    Type: String
    Default: "1.32"
    AllowedValues:
      - "1.32"
      - "1.31"
      - "1.30"
    Description: Kubernetes version for EKS cluster

  NodeInstanceType:
    Type: String
    Default: c7g.large
    AllowedValues:
      - c7g.medium
      - c7g.large
      - c7g.xlarge
      - c7g.2xlarge
      - m7g.medium
      - m7g.large
      - m7g.xlarge
      - m7g.2xlarge
      - r7g.medium
      - r7g.large
      - r7g.xlarge
      - c6g.medium
      - c6g.large
      - c6g.xlarge
      - c6g.2xlarge
      - c6i.large
      - c6i.xlarge
      - c6i.2xlarge
      - m6g.medium
      - m6g.large
      - m6g.xlarge
    Description: EC2 instance type for EKS worker nodes (ARM64 Graviton)

  NodeGroupMinSize:
    Type: Number
    Default: 3
    MinValue: 1
    MaxValue: 100
    Description: Minimum number of worker nodes

  NodeGroupMaxSize:
    Type: Number
    Default: 15
    MinValue: 1
    MaxValue: 100
    Description: Maximum number of worker nodes

  NodeGroupDesiredSize:
    Type: Number
    Default: 3
    MinValue: 1
    MaxValue: 100
    Description: Desired number of worker nodes

  # =============================================================================
  # DNS AND INGRESS CONFIGURATION
  # =============================================================================
  DomainName:
    Type: String
    Default: ""
    Description: Domain name for Route53 private hosted zone (e.g., empresa.com). Leave empty to skip DNS setup.
    AllowedPattern: "^$|^[a-zA-Z0-9][a-zA-Z0-9-]{0,61}[a-zA-Z0-9]?(\\.[a-zA-Z0-9][a-zA-Z0-9-]{0,61}[a-zA-Z0-9]?)*$"
    ConstraintDescription: "Must be a valid domain name (e.g., example.com or sub.example.com) or empty"

  EnableALBController:
    Type: String
    Default: "true"
    AllowedValues:
      - "true"
      - "false"
    Description: Enable AWS Load Balancer Controller for Ingress

  EnableExternalDNS:
    Type: String
    Default: "true"
    AllowedValues:
      - "true"
      - "false"
    Description: Enable ExternalDNS for automatic DNS management (requires DomainName)

Conditions:
  HasDomainName: !Not [!Equals [!Ref DomainName, ""]]
  ShouldEnableALBController: !Equals [!Ref EnableALBController, "true"]
  ShouldEnableExternalDNS: !And
    - !Condition HasDomainName
    - !Equals [!Ref EnableExternalDNS, "true"]

Resources:
  # =============================================================================
  # VPC STACK
  # =============================================================================
  VPCStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub "https://${MPS3BucketName}.s3.${MPS3BucketRegion}.${AWS::URLSuffix}/${MPS3KeyPrefix}vpc.yaml"
      Parameters:
        ProjectName: !Ref AWS::StackName
        EnvironmentName: !Ref EnvironmentName
        VpcCIDR: !Ref VpcCIDR
        AvailabilityZone1: !Ref AvailabilityZone1
        AvailabilityZone2: !Ref AvailabilityZone2
        AvailabilityZone3: !Ref AvailabilityZone3
        EnableFlowLogs: !Ref EnableFlowLogs
        FlowLogsRetentionDays: !Ref FlowLogsRetentionDays
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-vpc-stack"
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: ManagedBy
          Value: CloudFormation

  # =============================================================================
  # EKS STACK
  # =============================================================================
  EKSStack:
    Type: AWS::CloudFormation::Stack
    DependsOn: VPCStack
    Properties:
      TemplateURL: !Sub "https://${MPS3BucketName}.s3.${MPS3BucketRegion}.${AWS::URLSuffix}/${MPS3KeyPrefix}eks.yaml"
      Parameters:
        ProjectName: !Ref AWS::StackName
        EnvironmentName: !Ref EnvironmentName
        VpcId: !GetAtt VPCStack.Outputs.VpcId
        PrivateSubnetIds: !GetAtt VPCStack.Outputs.PrivateSubnetIds
        KubernetesVersion: !Ref KubernetesVersion
        NodeInstanceType: !Ref NodeInstanceType
        NodeGroupMinSize: !Ref NodeGroupMinSize
        NodeGroupMaxSize: !Ref NodeGroupMaxSize
        NodeGroupDesiredSize: !Ref NodeGroupDesiredSize
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-eks-stack"
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: ManagedBy
          Value: CloudFormation

  # =============================================================================
  # ROUTE53 STACK (Private Hosted Zone)
  # =============================================================================
  Route53Stack:
    Type: AWS::CloudFormation::Stack
    Condition: HasDomainName
    DependsOn: VPCStack
    Properties:
      TemplateURL: !Sub "https://${MPS3BucketName}.s3.${MPS3BucketRegion}.${AWS::URLSuffix}/${MPS3KeyPrefix}route53.yaml"
      Parameters:
        ProjectName: !Ref AWS::StackName
        EnvironmentName: !Ref EnvironmentName
        DomainName: !Ref DomainName
        VpcId: !GetAtt VPCStack.Outputs.VpcId
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-route53-stack"
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: ManagedBy
          Value: CloudFormation

  # =============================================================================
  # ALB CONTROLLER STACK
  # =============================================================================
  ALBControllerStack:
    Type: AWS::CloudFormation::Stack
    Condition: ShouldEnableALBController
    DependsOn: EKSStack
    Properties:
      TemplateURL: !Sub "https://${MPS3BucketName}.s3.${MPS3BucketRegion}.${AWS::URLSuffix}/${MPS3KeyPrefix}alb-controller.yaml"
      Parameters:
        ProjectName: !Ref AWS::StackName
        EnvironmentName: !Ref EnvironmentName
        VpcId: !GetAtt VPCStack.Outputs.VpcId
        ClusterName: !GetAtt EKSStack.Outputs.ClusterName
        OIDCProviderArn: !GetAtt EKSStack.Outputs.OIDCProviderArn
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-alb-controller-stack"
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: ManagedBy
          Value: CloudFormation

  # =============================================================================
  # EXTERNAL DNS STACK
  # =============================================================================
  ExternalDNSStack:
    Type: AWS::CloudFormation::Stack
    Condition: ShouldEnableExternalDNS
    DependsOn:
      - EKSStack
      - Route53Stack
    Properties:
      TemplateURL: !Sub "https://${MPS3BucketName}.s3.${MPS3BucketRegion}.${AWS::URLSuffix}/${MPS3KeyPrefix}external-dns.yaml"
      Parameters:
        ProjectName: !Ref AWS::StackName
        EnvironmentName: !Ref EnvironmentName
        ClusterName: !GetAtt EKSStack.Outputs.ClusterName
        OIDCProviderArn: !GetAtt EKSStack.Outputs.OIDCProviderArn
        PrivateHostedZoneId: !GetAtt Route53Stack.Outputs.PrivateHostedZoneId
        DomainName: !Ref DomainName
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-external-dns-stack"
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: ManagedBy
          Value: CloudFormation

Outputs:
  # =============================================================================
  # STACK METADATA
  # =============================================================================
  ProjectName:
    Description: Project name used in this deployment (stack name)
    Value: !Ref AWS::StackName

  EnvironmentName:
    Description: Environment name
    Value: !Ref EnvironmentName

  # =============================================================================
  # VPC OUTPUTS (used by product stacks as ExistingVpcId, ExistingPrivateSubnetIds)
  # =============================================================================
  VpcId:
    Description: VPC ID — pass as ExistingVpcId to product stacks
    Value: !GetAtt VPCStack.Outputs.VpcId

  VpcCIDR:
    Description: VPC CIDR Block — pass as VpcCIDR to product stacks
    Value: !Ref VpcCIDR

  PrivateSubnetIds:
    Description: Private Subnet IDs — pass as ExistingPrivateSubnetIds to product stacks
    Value: !GetAtt VPCStack.Outputs.PrivateSubnetIds

  DatabaseSubnetIds:
    Description: Database Subnet IDs (isolated subnets for databases)
    Value: !GetAtt VPCStack.Outputs.DatabaseSubnetIds

  # =============================================================================
  # EKS OUTPUTS (used by product stacks as ExistingClusterName, ExistingOIDCProviderArn)
  # =============================================================================
  EKSClusterName:
    Description: EKS Cluster Name — pass as ExistingClusterName to product stacks
    Value: !GetAtt EKSStack.Outputs.ClusterName

  EKSClusterEndpoint:
    Description: EKS Cluster Endpoint
    Value: !GetAtt EKSStack.Outputs.ClusterEndpoint

  OIDCProviderArn:
    Description: EKS OIDC Provider ARN — pass as ExistingOIDCProviderArn to product stacks
    Value: !GetAtt EKSStack.Outputs.OIDCProviderArn

  ClusterSecurityGroupId:
    Description: EKS Cluster Security Group ID
    Value: !GetAtt EKSStack.Outputs.ClusterSecurityGroupId

  # =============================================================================
  # ROUTE53 OUTPUTS
  # =============================================================================
  PrivateHostedZoneId:
    Condition: HasDomainName
    Description: Route53 Private Hosted Zone ID
    Value: !GetAtt Route53Stack.Outputs.PrivateHostedZoneId

  PrivateHostedZoneName:
    Condition: HasDomainName
    Description: Route53 Private Hosted Zone Name
    Value: !GetAtt Route53Stack.Outputs.PrivateHostedZoneName

  # =============================================================================
  # ALB CONTROLLER OUTPUTS
  # =============================================================================
  ALBControllerRoleArn:
    Condition: ShouldEnableALBController
    Description: ALB Controller IAM Role ARN
    Value: !GetAtt ALBControllerStack.Outputs.ALBControllerRoleArn

  # =============================================================================
  # EXTERNAL DNS OUTPUTS
  # =============================================================================
  ExternalDNSRoleArn:
    Condition: ShouldEnableExternalDNS
    Description: ExternalDNS IAM Role ARN
    Value: !GetAtt ExternalDNSStack.Outputs.ExternalDNSRoleArn

  # =============================================================================
  # UTILITY COMMANDS
  # =============================================================================
  KubeconfigCommand:
    Description: Command to configure kubectl
    Value: !Sub "aws eks update-kubeconfig --name ${EKSStack.Outputs.ClusterName} --region ${AWS::Region}"

  DeployProductCommand:
    Description: |
      Example command to deploy a product stack using this foundation.
      Pass UseExistingCluster=true and the foundation outputs as parameters.
    Value: !Sub
      - |
        aws cloudformation deploy \
          --stack-name <product-stack-name> \
          --template-url https://${MPS3BucketName}.s3.${MPS3BucketRegion}.amazonaws.com/${MPS3KeyPrefix}products/midaz/infrastructure.yaml \
          --parameter-overrides \
            UseExistingCluster=true \
            ExistingVpcId=${VpcId} \
            ExistingClusterName=${ClusterName} \
            ExistingPrivateSubnetIds="${PrivateSubnetIds}" \
            ExistingOIDCProviderArn=${OIDCProviderArn} \
            VpcCIDR=${VpcCIDRValue} \
          --capabilities CAPABILITY_IAM \
          --region ${AWS::Region}
      - VpcId: !GetAtt VPCStack.Outputs.VpcId
        ClusterName: !GetAtt EKSStack.Outputs.ClusterName
        PrivateSubnetIds: !GetAtt VPCStack.Outputs.PrivateSubnetIds
        OIDCProviderArn: !GetAtt EKSStack.Outputs.OIDCProviderArn
        VpcCIDRValue: !Ref VpcCIDR
