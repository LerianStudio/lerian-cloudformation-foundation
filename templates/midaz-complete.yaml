AWSTemplateFormatVersion: '2010-09-09'
Description: |
  Midaz - Complete Stack (AWS Marketplace)
  Deploys complete Midaz infrastructure AND application in a single stack.
  Includes: VPC, EKS, RDS, DocumentDB, ElastiCache, AmazonMQ, and Midaz application.
  (c) Lerian Studio - https://lerian.studio

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: "AWS Marketplace Configuration"
        Parameters:
          - MPS3BucketName
          - MPS3BucketRegion
          - MPS3KeyPrefix
      - Label:
          default: "Template Version Overrides (Advanced)"
        Parameters:
          - VPCTemplateVersion
          - EKSTemplateVersion
          - RDSTemplateVersion
          - DocumentDBTemplateVersion
          - ElastiCacheTemplateVersion
          - AmazonMQTemplateVersion
          - Route53TemplateVersion
          - ALBControllerTemplateVersion
          - ExternalDNSTemplateVersion
      - Label:
          default: "General Configuration"
        Parameters:
          - EnvironmentName
          - ProjectName
      - Label:
          default: "Network Configuration"
        Parameters:
          - VpcCIDR
          - AvailabilityZone1
          - AvailabilityZone2
          - AvailabilityZone3
          - EnableFlowLogs
          - FlowLogsRetentionDays
      - Label:
          default: "EKS Configuration"
        Parameters:
          - KubernetesVersion
          - NodeInstanceType
          - NodeGroupMinSize
          - NodeGroupMaxSize
          - NodeGroupDesiredSize
      - Label:
          default: "RDS PostgreSQL Configuration"
        Parameters:
          - RDSInstanceClass
          - RDSAllocatedStorage
          - RDSMaxAllocatedStorage
          - RDSDatabaseName
          - RDSMasterUsername
          - CreateReadReplica
          - RDSForceSSL
          - RDSMultiAZ
          - RDSDeletionProtection
          - RDSBackupRetentionPeriod
      - Label:
          default: "DocumentDB Configuration"
        Parameters:
          - DocumentDBInstanceClass
          - DocumentDBInstanceCount
          - DocumentDBMasterUsername
          - DocumentDBDeletionProtection
          - DocumentDBBackupRetentionPeriod
      - Label:
          default: "ElastiCache (Valkey/Redis) Configuration"
        Parameters:
          - ElastiCacheNodeType
      - Label:
          default: "AmazonMQ (RabbitMQ) Configuration"
        Parameters:
          - AmazonMQInstanceType
          - AmazonMQAdminUsername
      - Label:
          default: "DNS and Ingress Configuration"
        Parameters:
          - DomainName
          - EnableALBController
          - EnableExternalDNS
      - Label:
          default: "Midaz Application"
        Parameters:
          - DeployMidazApplication
          - MidazVersion
          - MidazReplicas
          - EnableIngress
          - IngressHostname
          - IngressCertificateArn
    ParameterLabels:
      # AWS Marketplace
      MPS3BucketName:
        default: "Template S3 Bucket Name"
      MPS3BucketRegion:
        default: "Template S3 Bucket Region"
      MPS3KeyPrefix:
        default: "Template S3 Key Prefix"
      # Version Overrides
      VPCTemplateVersion:
        default: "VPC Template Version"
      EKSTemplateVersion:
        default: "EKS Template Version"
      RDSTemplateVersion:
        default: "RDS Template Version"
      DocumentDBTemplateVersion:
        default: "DocumentDB Template Version"
      ElastiCacheTemplateVersion:
        default: "ElastiCache Template Version"
      AmazonMQTemplateVersion:
        default: "AmazonMQ Template Version"
      Route53TemplateVersion:
        default: "Route53 Template Version"
      ALBControllerTemplateVersion:
        default: "ALB Controller Template Version"
      ExternalDNSTemplateVersion:
        default: "ExternalDNS Template Version"
      # Midaz Application
      DeployMidazApplication:
        default: "Deploy Midaz Application"
      MidazVersion:
        default: "Midaz Version"
      MidazReplicas:
        default: "Number of Replicas"
      EnableIngress:
        default: "Enable Ingress (ALB)"
      IngressHostname:
        default: "Ingress Hostname"
      IngressCertificateArn:
        default: "HTTPS Certificate ARN"
      # General
      EnvironmentName:
        default: "Environment"
      ProjectName:
        default: "Project Name"
      # Network
      VpcCIDR:
        default: "VPC CIDR Block"
      AvailabilityZone1:
        default: "Availability Zone 1"
      AvailabilityZone2:
        default: "Availability Zone 2"
      AvailabilityZone3:
        default: "Availability Zone 3"
      EnableFlowLogs:
        default: "Enable VPC Flow Logs"
      FlowLogsRetentionDays:
        default: "Flow Logs Retention (Days)"
      # EKS
      KubernetesVersion:
        default: "Kubernetes Version"
      NodeInstanceType:
        default: "Node Instance Type"
      NodeGroupMinSize:
        default: "Minimum Nodes"
      NodeGroupMaxSize:
        default: "Maximum Nodes"
      NodeGroupDesiredSize:
        default: "Desired Nodes"
      # RDS
      RDSInstanceClass:
        default: "RDS Instance Class"
      RDSAllocatedStorage:
        default: "Initial Storage (GB)"
      RDSMaxAllocatedStorage:
        default: "Maximum Storage (GB)"
      RDSDatabaseName:
        default: "Database Name"
      RDSMasterUsername:
        default: "Master Username"
      CreateReadReplica:
        default: "Create Read Replica"
      RDSForceSSL:
        default: "Force SSL Connections"
      RDSMultiAZ:
        default: "Multi-AZ Deployment"
      RDSDeletionProtection:
        default: "Deletion Protection"
      RDSBackupRetentionPeriod:
        default: "Backup Retention (Days)"
      # DocumentDB
      DocumentDBInstanceClass:
        default: "DocumentDB Instance Class"
      DocumentDBInstanceCount:
        default: "Number of Instances"
      DocumentDBMasterUsername:
        default: "Master Username"
      DocumentDBDeletionProtection:
        default: "Deletion Protection"
      DocumentDBBackupRetentionPeriod:
        default: "Backup Retention (Days)"
      # ElastiCache
      ElastiCacheNodeType:
        default: "Cache Node Type"
      # AmazonMQ
      AmazonMQInstanceType:
        default: "Broker Instance Type"
      AmazonMQAdminUsername:
        default: "Admin Username"
      # DNS
      DomainName:
        default: "Domain Name (Optional)"
      EnableALBController:
        default: "Enable ALB Controller"
      EnableExternalDNS:
        default: "Enable ExternalDNS"

Parameters:
  # =============================================================================
  # AWS MARKETPLACE PARAMETERS (Required for Nested Stacks)
  # =============================================================================
  MPS3BucketName:
    Type: String
    Description: "S3 bucket name containing the CloudFormation templates (managed by AWS Marketplace)"
    Default: "midaz-cloudformation-templates"

  MPS3BucketRegion:
    Type: String
    Description: "AWS Region where the S3 bucket is located"
    Default: "us-east-1"
    AllowedValues:
      - us-east-1
      - us-east-2
      - us-west-1
      - us-west-2
      - eu-west-1
      - eu-west-2
      - eu-central-1
      - ap-southeast-1
      - ap-southeast-2
      - ap-northeast-1
      - sa-east-1

  MPS3KeyPrefix:
    Type: String
    Description: "S3 key prefix for the CloudFormation templates"
    Default: "templates/"
    AllowedPattern: "^[a-zA-Z0-9-_./]*$"
    ConstraintDescription: "Key prefix can include alphanumeric characters, hyphens, underscores, periods, and forward slashes"

  # =============================================================================
  # TEMPLATE VERSION OVERRIDES (Advanced)
  # Use these to pin specific versions of individual templates
  # Format: "latest" or semver like "1.0.0"
  # When set, overrides the MPS3KeyPrefix path for that specific template
  # =============================================================================
  VPCTemplateVersion:
    Type: String
    Default: ""
    Description: "VPC template version override (e.g., 'latest' or 'v1.0.0'). Empty uses default MPS3KeyPrefix"
    AllowedPattern: "^$|^latest$|^v[0-9]+\\.[0-9]+\\.[0-9]+$"
    ConstraintDescription: "Must be empty, 'latest', or 'v' followed by semver (e.g., v1.0.0)"

  EKSTemplateVersion:
    Type: String
    Default: ""
    Description: "EKS template version override (e.g., 'latest' or 'v1.0.0')"
    AllowedPattern: "^$|^latest$|^v[0-9]+\\.[0-9]+\\.[0-9]+$"
    ConstraintDescription: "Must be empty, 'latest', or 'v' followed by semver (e.g., v1.0.0)"

  RDSTemplateVersion:
    Type: String
    Default: ""
    Description: "RDS template version override (e.g., 'latest' or 'v1.0.0')"
    AllowedPattern: "^$|^latest$|^v[0-9]+\\.[0-9]+\\.[0-9]+$"
    ConstraintDescription: "Must be empty, 'latest', or 'v' followed by semver (e.g., v1.0.0)"

  DocumentDBTemplateVersion:
    Type: String
    Default: ""
    Description: "DocumentDB template version override (e.g., 'latest' or 'v1.0.0')"
    AllowedPattern: "^$|^latest$|^v[0-9]+\\.[0-9]+\\.[0-9]+$"
    ConstraintDescription: "Must be empty, 'latest', or 'v' followed by semver (e.g., v1.0.0)"

  ElastiCacheTemplateVersion:
    Type: String
    Default: ""
    Description: "ElastiCache template version override (e.g., 'latest' or 'v1.0.0')"
    AllowedPattern: "^$|^latest$|^v[0-9]+\\.[0-9]+\\.[0-9]+$"
    ConstraintDescription: "Must be empty, 'latest', or 'v' followed by semver (e.g., v1.0.0)"

  AmazonMQTemplateVersion:
    Type: String
    Default: ""
    Description: "AmazonMQ template version override (e.g., 'latest' or 'v1.0.0')"
    AllowedPattern: "^$|^latest$|^v[0-9]+\\.[0-9]+\\.[0-9]+$"
    ConstraintDescription: "Must be empty, 'latest', or 'v' followed by semver (e.g., v1.0.0)"

  Route53TemplateVersion:
    Type: String
    Default: ""
    Description: "Route53 template version override (e.g., 'latest' or 'v1.0.0')"
    AllowedPattern: "^$|^latest$|^v[0-9]+\\.[0-9]+\\.[0-9]+$"
    ConstraintDescription: "Must be empty, 'latest', or 'v' followed by semver (e.g., v1.0.0)"

  ALBControllerTemplateVersion:
    Type: String
    Default: ""
    Description: "ALB Controller template version override (e.g., 'latest' or 'v1.0.0')"
    AllowedPattern: "^$|^latest$|^v[0-9]+\\.[0-9]+\\.[0-9]+$"
    ConstraintDescription: "Must be empty, 'latest', or 'v' followed by semver (e.g., v1.0.0)"

  ExternalDNSTemplateVersion:
    Type: String
    Default: ""
    Description: "ExternalDNS template version override (e.g., 'latest' or 'v1.0.0')"
    AllowedPattern: "^$|^latest$|^v[0-9]+\\.[0-9]+\\.[0-9]+$"
    ConstraintDescription: "Must be empty, 'latest', or 'v' followed by semver (e.g., v1.0.0)"

  # =============================================================================
  # GENERAL CONFIGURATION
  # =============================================================================
  EnvironmentName:
    Type: String
    Default: production
    AllowedValues:
      - development
      - staging
      - production
    Description: Environment name for resource tagging

  ProjectName:
    Type: String
    Default: midaz
    Description: Project name used for resource naming
    AllowedPattern: "^[a-z][a-z0-9-]*$"
    MinLength: 3
    MaxLength: 24
    ConstraintDescription: "Must begin with a lowercase letter, contain only lowercase letters, numbers, and hyphens, and be 3-24 characters long"

  # Network
  VpcCIDR:
    Type: String
    Default: 10.50.0.0/16
    Description: CIDR block for the VPC
    AllowedPattern: ^(([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])\.){3}([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])(\/([0-9]|[1-2][0-9]|3[0-2]))$

  AvailabilityZone1:
    Type: AWS::EC2::AvailabilityZone::Name
    Description: First Availability Zone

  AvailabilityZone2:
    Type: AWS::EC2::AvailabilityZone::Name
    Description: Second Availability Zone

  AvailabilityZone3:
    Type: AWS::EC2::AvailabilityZone::Name
    Description: Third Availability Zone

  EnableFlowLogs:
    Type: String
    AllowedValues:
      - "true"
      - "false"
    Default: "false"
    Description: Enable VPC Flow Logs for network traffic auditing and security analysis.

  FlowLogsRetentionDays:
    Type: Number
    Default: 14
    AllowedValues:
      - 1
      - 3
      - 5
      - 7
      - 14
      - 30
      - 60
      - 90
      - 120
      - 150
      - 180
      - 365
      - 400
      - 545
      - 731
      - 1827
      - 3653
    Description: Number of days to retain VPC Flow Logs in CloudWatch.

  # EKS
  KubernetesVersion:
    Type: String
    Default: "1.32"
    AllowedValues:
      - "1.32"
      - "1.31"
      - "1.30"
    Description: Kubernetes version for EKS cluster

  NodeInstanceType:
    Type: String
    Default: c7g.large
    AllowedValues:
      # ARM64 Graviton3 instances (compatible with AL2_ARM_64 AMI)
      - c7g.medium
      - c7g.large
      - c7g.xlarge
      - c7g.2xlarge
      - m7g.medium
      - m7g.large
      - m7g.xlarge
      - m7g.2xlarge
      - r7g.medium
      - r7g.large
      - r7g.xlarge
      # ARM64 Graviton2 instances (fallback options)
      - c6g.medium
      - c6g.large
      - c6g.xlarge
      - m6g.medium
      - m6g.large
      - m6g.xlarge
    Description: EC2 instance type for EKS worker nodes (ARM64 Graviton only)

  NodeGroupMinSize:
    Type: Number
    Default: 3
    MinValue: 1
    MaxValue: 100
    Description: Minimum number of worker nodes

  NodeGroupMaxSize:
    Type: Number
    Default: 15
    MinValue: 1
    MaxValue: 100
    Description: Maximum number of worker nodes

  NodeGroupDesiredSize:
    Type: Number
    Default: 3
    MinValue: 1
    MaxValue: 100
    Description: Desired number of worker nodes

  # RDS
  RDSInstanceClass:
    Type: String
    Default: db.t3.medium
    AllowedValues:
      - db.t3.micro
      - db.t3.small
      - db.t3.medium
      - db.t3.large
      - db.m7g.large
      - db.m7g.xlarge
      - db.r7g.large
      - db.r7g.xlarge
    Description: RDS instance class

  RDSAllocatedStorage:
    Type: Number
    Default: 20
    MinValue: 20
    MaxValue: 65536
    Description: Initial storage allocation in GB

  RDSMaxAllocatedStorage:
    Type: Number
    Default: 100
    MinValue: 20
    MaxValue: 65536
    Description: Maximum storage for autoscaling in GB

  RDSDatabaseName:
    Type: String
    Default: midaz
    Description: Name of the initial database
    AllowedPattern: "^[a-zA-Z][a-zA-Z0-9_]*$"
    MinLength: 1
    MaxLength: 64
    ConstraintDescription: "Must begin with a letter and contain only alphanumeric characters and underscores"

  RDSMasterUsername:
    Type: String
    Default: postgres
    NoEcho: true
    Description: Master username for RDS (sensitive)
    AllowedPattern: "^[a-zA-Z][a-zA-Z0-9_]*$"
    MinLength: 1
    MaxLength: 63
    ConstraintDescription: "Must begin with a letter and contain only alphanumeric characters and underscores"

  CreateReadReplica:
    Type: String
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
    Description: Create a read replica for RDS

  RDSForceSSL:
    Type: String
    Default: "0"
    AllowedValues:
      - "0"
      - "1"
    Description: Force SSL/TLS connections to RDS (1 = enabled, 0 = disabled). Recommended for production with sensitive data.

  RDSMultiAZ:
    Type: String
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
    Description: Enable Multi-AZ deployment for high availability. Recommended for production workloads.

  RDSDeletionProtection:
    Type: String
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
    Description: Enable deletion protection to prevent accidental database deletion.

  RDSBackupRetentionPeriod:
    Type: Number
    Default: 7
    MinValue: 1
    MaxValue: 35
    Description: Number of days to retain automated backups (1-35). Recommended 30+ for production.

  # DocumentDB
  DocumentDBInstanceClass:
    Type: String
    Default: db.t3.medium
    AllowedValues:
      - db.t3.medium
      - db.r6g.large
      - db.r6g.xlarge
      - db.r6g.2xlarge
    Description: DocumentDB instance class

  DocumentDBInstanceCount:
    Type: Number
    Default: 2
    MinValue: 1
    MaxValue: 16
    Description: Number of DocumentDB instances

  DocumentDBMasterUsername:
    Type: String
    Default: docdbadmin
    NoEcho: true
    Description: Master username for DocumentDB (sensitive)
    AllowedPattern: "^[a-zA-Z][a-zA-Z0-9_]*$"
    MinLength: 1
    MaxLength: 63
    ConstraintDescription: "Must begin with a letter and contain only alphanumeric characters and underscores"

  DocumentDBDeletionProtection:
    Type: String
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
    Description: Enable deletion protection to prevent accidental cluster deletion.

  DocumentDBBackupRetentionPeriod:
    Type: Number
    Default: 7
    MinValue: 1
    MaxValue: 35
    Description: Number of days to retain automated backups (1-35). Recommended 30+ for production.

  # ElastiCache
  ElastiCacheNodeType:
    Type: String
    Default: cache.m7g.large
    AllowedValues:
      - cache.t3.micro
      - cache.t3.small
      - cache.t3.medium
      - cache.m7g.large
      - cache.m7g.xlarge
      - cache.r7g.large
      - cache.r7g.xlarge
    Description: ElastiCache node type

  # AmazonMQ
  AmazonMQInstanceType:
    Type: String
    Default: mq.t3.micro
    AllowedValues:
      - mq.t3.micro
      - mq.m5.large
      - mq.m5.xlarge
      - mq.m5.2xlarge
    Description: AmazonMQ broker instance type

  AmazonMQAdminUsername:
    Type: String
    Default: mqadmin
    NoEcho: true
    Description: Admin username for AmazonMQ (sensitive)
    AllowedPattern: "^[a-zA-Z][a-zA-Z0-9_]*$"
    MinLength: 1
    MaxLength: 100
    ConstraintDescription: "Must begin with a letter and contain only alphanumeric characters and underscores"

  # =============================================================================
  # DNS AND INGRESS CONFIGURATION
  # =============================================================================
  DomainName:
    Type: String
    Default: ""
    Description: Domain name for Route53 private hosted zone (e.g., midaz.empresa.com). Leave empty to skip DNS setup.
    AllowedPattern: "^$|^[a-zA-Z0-9][a-zA-Z0-9-]{0,61}[a-zA-Z0-9]?(\\.[a-zA-Z0-9][a-zA-Z0-9-]{0,61}[a-zA-Z0-9]?)*$"
    ConstraintDescription: "Must be a valid domain name (e.g., example.com or sub.example.com) or empty"

  EnableALBController:
    Type: String
    Default: "true"
    AllowedValues:
      - "true"
      - "false"
    Description: Enable AWS Load Balancer Controller for Ingress

  EnableExternalDNS:
    Type: String
    Default: "true"
    AllowedValues:
      - "true"
      - "false"
    Description: Enable ExternalDNS for automatic DNS management (requires DomainName)

  # =============================================================================
  # MIDAZ APPLICATION CONFIGURATION
  # =============================================================================
  DeployMidazApplication:
    Type: String
    Default: "true"
    AllowedValues:
      - "true"
      - "false"
    Description: Deploy Midaz application via Helm (set to false for infrastructure-only deployment)

  MidazVersion:
    Type: String
    Default: "5.3.0"
    Description: Midaz Helm chart version to deploy
    AllowedPattern: "^[a-zA-Z0-9.-]+$"
    ConstraintDescription: "Must be a valid version string"

  MidazReplicas:
    Type: Number
    Default: 2
    MinValue: 1
    MaxValue: 10
    Description: Number of Midaz application replicas

  EnableIngress:
    Type: String
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
    Description: Enable ALB Ingress for external access to Midaz API

  IngressHostname:
    Type: String
    Default: ""
    Description: Full hostname for Ingress (e.g., ledger.midaz.net). Required if EnableIngress=true.
    AllowedPattern: "^$|^[a-zA-Z0-9][a-zA-Z0-9-]{0,61}[a-zA-Z0-9]?(\\.[a-zA-Z0-9][a-zA-Z0-9-]{0,61}[a-zA-Z0-9]?)*$"
    ConstraintDescription: "Must be a valid hostname or empty"

  IngressCertificateArn:
    Type: String
    Default: ""
    Description: ACM Certificate ARN for HTTPS (optional, requires EnableIngress=true)
    AllowedPattern: "^$|^arn:aws:acm:[a-z0-9-]+:[0-9]+:certificate/[a-f0-9-]+$"
    ConstraintDescription: "Must be a valid ACM certificate ARN or empty"

Conditions:
  CreateRDSReplica: !Equals [!Ref CreateReadReplica, "true"]
  HasDomainName: !Not [!Equals [!Ref DomainName, ""]]
  ShouldEnableALBController: !Equals [!Ref EnableALBController, "true"]
  ShouldEnableExternalDNS: !And
    - !Condition HasDomainName
    - !Equals [!Ref EnableExternalDNS, "true"]

  # Application conditions
  ShouldDeployApplication: !Equals [!Ref DeployMidazApplication, "true"]
  HasIngress: !Equals [!Ref EnableIngress, "true"]
  HasCertificate: !Not [!Equals [!Ref IngressCertificateArn, ""]]

  # Version override conditions
  HasVPCVersionOverride: !Not [!Equals [!Ref VPCTemplateVersion, ""]]
  HasEKSVersionOverride: !Not [!Equals [!Ref EKSTemplateVersion, ""]]
  HasRDSVersionOverride: !Not [!Equals [!Ref RDSTemplateVersion, ""]]
  HasDocumentDBVersionOverride: !Not [!Equals [!Ref DocumentDBTemplateVersion, ""]]
  HasElastiCacheVersionOverride: !Not [!Equals [!Ref ElastiCacheTemplateVersion, ""]]
  HasAmazonMQVersionOverride: !Not [!Equals [!Ref AmazonMQTemplateVersion, ""]]
  HasRoute53VersionOverride: !Not [!Equals [!Ref Route53TemplateVersion, ""]]
  HasALBControllerVersionOverride: !Not [!Equals [!Ref ALBControllerTemplateVersion, ""]]
  HasExternalDNSVersionOverride: !Not [!Equals [!Ref ExternalDNSTemplateVersion, ""]]

Resources:
  # =============================================================================
  # VPC STACK
  # =============================================================================
  VPCStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !If
        - HasVPCVersionOverride
        - !Sub "https://${MPS3BucketName}.s3.${MPS3BucketRegion}.${AWS::URLSuffix}/templates/vpc/${VPCTemplateVersion}/vpc.yaml"
        - !Sub "https://${MPS3BucketName}.s3.${MPS3BucketRegion}.${AWS::URLSuffix}/${MPS3KeyPrefix}vpc.yaml"
      Parameters:
        ProjectName: !Ref ProjectName
        EnvironmentName: !Ref EnvironmentName
        VpcCIDR: !Ref VpcCIDR
        AvailabilityZone1: !Ref AvailabilityZone1
        AvailabilityZone2: !Ref AvailabilityZone2
        AvailabilityZone3: !Ref AvailabilityZone3
        EnableFlowLogs: !Ref EnableFlowLogs
        FlowLogsRetentionDays: !Ref FlowLogsRetentionDays
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-vpc-stack"
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: ManagedBy
          Value: CloudFormation

  # =============================================================================
  # RDS STACK
  # =============================================================================
  RDSStack:
    Type: AWS::CloudFormation::Stack
    DependsOn: VPCStack
    Properties:
      TemplateURL: !If
        - HasRDSVersionOverride
        - !Sub "https://${MPS3BucketName}.s3.${MPS3BucketRegion}.${AWS::URLSuffix}/templates/rds/${RDSTemplateVersion}/rds.yaml"
        - !Sub "https://${MPS3BucketName}.s3.${MPS3BucketRegion}.${AWS::URLSuffix}/${MPS3KeyPrefix}rds.yaml"
      Parameters:
        ProjectName: !Ref ProjectName
        EnvironmentName: !Ref EnvironmentName
        VpcId: !GetAtt VPCStack.Outputs.VpcId
        VpcCIDR: !Ref VpcCIDR
        DatabaseSubnetIds: !GetAtt VPCStack.Outputs.DatabaseSubnetIds
        InstanceClass: !Ref RDSInstanceClass
        AllocatedStorage: !Ref RDSAllocatedStorage
        MaxAllocatedStorage: !Ref RDSMaxAllocatedStorage
        DatabaseName: !Ref RDSDatabaseName
        MasterUsername: !Ref RDSMasterUsername
        CreateReadReplica: !Ref CreateReadReplica
        ForceSSL: !Ref RDSForceSSL
        MultiAZ: !Ref RDSMultiAZ
        DeletionProtection: !Ref RDSDeletionProtection
        BackupRetentionPeriod: !Ref RDSBackupRetentionPeriod
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-rds-stack"
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: ManagedBy
          Value: CloudFormation

  # =============================================================================
  # DOCUMENTDB STACK
  # =============================================================================
  DocumentDBStack:
    Type: AWS::CloudFormation::Stack
    DependsOn: VPCStack
    Properties:
      TemplateURL: !If
        - HasDocumentDBVersionOverride
        - !Sub "https://${MPS3BucketName}.s3.${MPS3BucketRegion}.${AWS::URLSuffix}/templates/documentdb/${DocumentDBTemplateVersion}/documentdb.yaml"
        - !Sub "https://${MPS3BucketName}.s3.${MPS3BucketRegion}.${AWS::URLSuffix}/${MPS3KeyPrefix}documentdb.yaml"
      Parameters:
        ProjectName: !Ref ProjectName
        EnvironmentName: !Ref EnvironmentName
        VpcId: !GetAtt VPCStack.Outputs.VpcId
        VpcCIDR: !Ref VpcCIDR
        PrivateSubnetIds: !GetAtt VPCStack.Outputs.PrivateSubnetIds
        InstanceClass: !Ref DocumentDBInstanceClass
        InstanceCount: !Ref DocumentDBInstanceCount
        MasterUsername: !Ref DocumentDBMasterUsername
        DeletionProtection: !Ref DocumentDBDeletionProtection
        BackupRetentionPeriod: !Ref DocumentDBBackupRetentionPeriod
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-documentdb-stack"
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: ManagedBy
          Value: CloudFormation

  # =============================================================================
  # ELASTICACHE STACK
  # =============================================================================
  ElastiCacheStack:
    Type: AWS::CloudFormation::Stack
    DependsOn: VPCStack
    Properties:
      TemplateURL: !If
        - HasElastiCacheVersionOverride
        - !Sub "https://${MPS3BucketName}.s3.${MPS3BucketRegion}.${AWS::URLSuffix}/templates/elasticache/${ElastiCacheTemplateVersion}/elasticache.yaml"
        - !Sub "https://${MPS3BucketName}.s3.${MPS3BucketRegion}.${AWS::URLSuffix}/${MPS3KeyPrefix}elasticache.yaml"
      Parameters:
        ProjectName: !Ref ProjectName
        EnvironmentName: !Ref EnvironmentName
        VpcId: !GetAtt VPCStack.Outputs.VpcId
        VpcCIDR: !Ref VpcCIDR
        CacheSubnetIds: !GetAtt VPCStack.Outputs.DatabaseSubnetIds
        NodeType: !Ref ElastiCacheNodeType
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-elasticache-stack"
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: ManagedBy
          Value: CloudFormation

  # =============================================================================
  # AMAZONMQ STACK
  # =============================================================================
  AmazonMQStack:
    Type: AWS::CloudFormation::Stack
    DependsOn: VPCStack
    Properties:
      TemplateURL: !If
        - HasAmazonMQVersionOverride
        - !Sub "https://${MPS3BucketName}.s3.${MPS3BucketRegion}.${AWS::URLSuffix}/templates/amazonmq/${AmazonMQTemplateVersion}/amazonmq.yaml"
        - !Sub "https://${MPS3BucketName}.s3.${MPS3BucketRegion}.${AWS::URLSuffix}/${MPS3KeyPrefix}amazonmq.yaml"
      Parameters:
        ProjectName: !Ref ProjectName
        EnvironmentName: !Ref EnvironmentName
        VpcId: !GetAtt VPCStack.Outputs.VpcId
        VpcCIDR: !Ref VpcCIDR
        PrivateSubnetId: !Select [0, !Split [",", !GetAtt VPCStack.Outputs.PrivateSubnetIds]]
        InstanceType: !Ref AmazonMQInstanceType
        AdminUsername: !Ref AmazonMQAdminUsername
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-amazonmq-stack"
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: ManagedBy
          Value: CloudFormation

  # =============================================================================
  # EKS STACK
  # =============================================================================
  EKSStack:
    Type: AWS::CloudFormation::Stack
    DependsOn:
      - VPCStack
      - RDSStack
      - DocumentDBStack
      - ElastiCacheStack
      - AmazonMQStack
    Properties:
      TemplateURL: !If
        - HasEKSVersionOverride
        - !Sub "https://${MPS3BucketName}.s3.${MPS3BucketRegion}.${AWS::URLSuffix}/templates/eks/${EKSTemplateVersion}/eks.yaml"
        - !Sub "https://${MPS3BucketName}.s3.${MPS3BucketRegion}.${AWS::URLSuffix}/${MPS3KeyPrefix}eks.yaml"
      Parameters:
        ProjectName: !Ref ProjectName
        EnvironmentName: !Ref EnvironmentName
        VpcId: !GetAtt VPCStack.Outputs.VpcId
        PrivateSubnetIds: !GetAtt VPCStack.Outputs.PrivateSubnetIds
        KubernetesVersion: !Ref KubernetesVersion
        NodeInstanceType: !Ref NodeInstanceType
        NodeGroupMinSize: !Ref NodeGroupMinSize
        NodeGroupMaxSize: !Ref NodeGroupMaxSize
        NodeGroupDesiredSize: !Ref NodeGroupDesiredSize
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-eks-stack"
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: ManagedBy
          Value: CloudFormation

  # =============================================================================
  # ROUTE53 STACK (Private Hosted Zone)
  # =============================================================================
  Route53Stack:
    Type: AWS::CloudFormation::Stack
    Condition: HasDomainName
    DependsOn: VPCStack
    Properties:
      TemplateURL: !If
        - HasRoute53VersionOverride
        - !Sub "https://${MPS3BucketName}.s3.${MPS3BucketRegion}.${AWS::URLSuffix}/templates/route53/${Route53TemplateVersion}/route53.yaml"
        - !Sub "https://${MPS3BucketName}.s3.${MPS3BucketRegion}.${AWS::URLSuffix}/${MPS3KeyPrefix}route53.yaml"
      Parameters:
        ProjectName: !Ref ProjectName
        EnvironmentName: !Ref EnvironmentName
        DomainName: !Ref DomainName
        VpcId: !GetAtt VPCStack.Outputs.VpcId
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-route53-stack"
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: ManagedBy
          Value: CloudFormation

  # =============================================================================
  # ALB CONTROLLER STACK
  # =============================================================================
  ALBControllerStack:
    Type: AWS::CloudFormation::Stack
    Condition: ShouldEnableALBController
    DependsOn: EKSStack
    Properties:
      TemplateURL: !If
        - HasALBControllerVersionOverride
        - !Sub "https://${MPS3BucketName}.s3.${MPS3BucketRegion}.${AWS::URLSuffix}/templates/alb-controller/${ALBControllerTemplateVersion}/alb-controller.yaml"
        - !Sub "https://${MPS3BucketName}.s3.${MPS3BucketRegion}.${AWS::URLSuffix}/${MPS3KeyPrefix}alb-controller.yaml"
      Parameters:
        ProjectName: !Ref ProjectName
        EnvironmentName: !Ref EnvironmentName
        VpcId: !GetAtt VPCStack.Outputs.VpcId
        ClusterName: !GetAtt EKSStack.Outputs.ClusterName
        OIDCProviderArn: !GetAtt EKSStack.Outputs.OIDCProviderArn
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-alb-controller-stack"
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: ManagedBy
          Value: CloudFormation

  # =============================================================================
  # EXTERNAL DNS STACK
  # =============================================================================
  ExternalDNSStack:
    Type: AWS::CloudFormation::Stack
    Condition: ShouldEnableExternalDNS
    DependsOn:
      - EKSStack
      - Route53Stack
    Properties:
      TemplateURL: !If
        - HasExternalDNSVersionOverride
        - !Sub "https://${MPS3BucketName}.s3.${MPS3BucketRegion}.${AWS::URLSuffix}/templates/external-dns/${ExternalDNSTemplateVersion}/external-dns.yaml"
        - !Sub "https://${MPS3BucketName}.s3.${MPS3BucketRegion}.${AWS::URLSuffix}/${MPS3KeyPrefix}external-dns.yaml"
      Parameters:
        ProjectName: !Ref ProjectName
        EnvironmentName: !Ref EnvironmentName
        ClusterName: !GetAtt EKSStack.Outputs.ClusterName
        OIDCProviderArn: !GetAtt EKSStack.Outputs.OIDCProviderArn
        PrivateHostedZoneId: !GetAtt Route53Stack.Outputs.PrivateHostedZoneId
        DomainName: !Ref DomainName
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-external-dns-stack"
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: ManagedBy
          Value: CloudFormation

  # =============================================================================
  # MIDAZ APPLICATION (HELM DEPLOYMENT)
  # =============================================================================
  MidazHelmStack:
    Type: AWS::CloudFormation::Stack
    Condition: ShouldDeployApplication
    DependsOn:
      - EKSStack
      - RDSStack
      - DocumentDBStack
      - ElastiCacheStack
      - AmazonMQStack
    Properties:
      TemplateURL: !Sub "https://${MPS3BucketName}.s3.${MPS3BucketRegion}.${AWS::URLSuffix}/${MPS3KeyPrefix}midaz-helm.yaml"
      Parameters:
        ProjectName: !Ref ProjectName
        EnvironmentName: !Ref EnvironmentName
        ClusterName: !GetAtt EKSStack.Outputs.ClusterName
        ClusterSecurityGroupId: !GetAtt EKSStack.Outputs.ClusterSecurityGroupId
        OIDCProviderArn: !GetAtt EKSStack.Outputs.OIDCProviderArn
        VpcId: !GetAtt VPCStack.Outputs.VpcId
        PrivateSubnetIds: !GetAtt VPCStack.Outputs.PrivateSubnetIds
        # Database connections
        RDSEndpoint: !GetAtt RDSStack.Outputs.Endpoint
        RDSSecretArn: !GetAtt RDSStack.Outputs.SecretArn
        DocumentDBEndpoint: !GetAtt DocumentDBStack.Outputs.ClusterEndpoint
        DocumentDBSecretArn: !GetAtt DocumentDBStack.Outputs.SecretArn
        ElastiCacheEndpoint: !GetAtt ElastiCacheStack.Outputs.PrimaryEndpoint
        AmazonMQEndpoint: !GetAtt AmazonMQStack.Outputs.BrokerEndpoint
        AmazonMQSecretArn: !GetAtt AmazonMQStack.Outputs.SecretArn
        # Application settings
        MidazChartVersion: !Ref MidazVersion
        EnableIngress: !Ref EnableIngress
        DomainName: !Ref DomainName
        IngressHostname: !Ref IngressHostname
        IngressScheme: "internal"
        IngressCertificateArn: !Ref IngressCertificateArn
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-midaz-app-stack"
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: ManagedBy
          Value: CloudFormation

Outputs:
  # =============================================================================
  # STACK METADATA (for application stack reference)
  # =============================================================================
  ProjectName:
    Description: Project name used in this deployment
    Value: !Ref ProjectName
    Export:
      Name: !Sub "${AWS::StackName}-ProjectName"

  EnvironmentName:
    Description: Environment name
    Value: !Ref EnvironmentName
    Export:
      Name: !Sub "${AWS::StackName}-EnvironmentName"

  # =============================================================================
  # VPC OUTPUTS
  # =============================================================================
  VpcId:
    Description: VPC ID
    Value: !GetAtt VPCStack.Outputs.VpcId
    Export:
      Name: !Sub "${AWS::StackName}-VpcId"

  PrivateSubnetIds:
    Description: Private Subnet IDs
    Value: !GetAtt VPCStack.Outputs.PrivateSubnetIds
    Export:
      Name: !Sub "${AWS::StackName}-PrivateSubnetIds"

  # =============================================================================
  # EKS OUTPUTS
  # =============================================================================
  EKSClusterName:
    Description: EKS Cluster Name
    Value: !GetAtt EKSStack.Outputs.ClusterName
    Export:
      Name: !Sub "${AWS::StackName}-EKSClusterName"

  EKSClusterEndpoint:
    Description: EKS Cluster Endpoint
    Value: !GetAtt EKSStack.Outputs.ClusterEndpoint
    Export:
      Name: !Sub "${AWS::StackName}-EKSClusterEndpoint"

  OIDCProviderArn:
    Description: EKS OIDC Provider ARN
    Value: !GetAtt EKSStack.Outputs.OIDCProviderArn
    Export:
      Name: !Sub "${AWS::StackName}-OIDCProviderArn"

  # =============================================================================
  # RDS OUTPUTS
  # =============================================================================
  RDSEndpoint:
    Description: RDS Primary Endpoint
    Value: !GetAtt RDSStack.Outputs.Endpoint
    Export:
      Name: !Sub "${AWS::StackName}-RDSEndpoint"

  RDSSecretArn:
    Description: RDS Password Secret ARN
    Value: !GetAtt RDSStack.Outputs.SecretArn
    Export:
      Name: !Sub "${AWS::StackName}-RDSSecretArn"

  # =============================================================================
  # DOCUMENTDB OUTPUTS
  # =============================================================================
  DocumentDBEndpoint:
    Description: DocumentDB Cluster Endpoint
    Value: !GetAtt DocumentDBStack.Outputs.ClusterEndpoint
    Export:
      Name: !Sub "${AWS::StackName}-DocumentDBEndpoint"

  DocumentDBSecretArn:
    Description: DocumentDB Password Secret ARN
    Value: !GetAtt DocumentDBStack.Outputs.SecretArn
    Export:
      Name: !Sub "${AWS::StackName}-DocumentDBSecretArn"

  # =============================================================================
  # ELASTICACHE OUTPUTS
  # =============================================================================
  ElastiCacheEndpoint:
    Description: ElastiCache Primary Endpoint
    Value: !GetAtt ElastiCacheStack.Outputs.PrimaryEndpoint
    Export:
      Name: !Sub "${AWS::StackName}-ElastiCacheEndpoint"

  # =============================================================================
  # AMAZONMQ OUTPUTS
  # =============================================================================
  AmazonMQEndpoint:
    Description: AmazonMQ Broker Endpoint
    Value: !GetAtt AmazonMQStack.Outputs.BrokerEndpoint
    Export:
      Name: !Sub "${AWS::StackName}-AmazonMQEndpoint"

  AmazonMQSecretArn:
    Description: AmazonMQ Password Secret ARN
    Value: !GetAtt AmazonMQStack.Outputs.SecretArn
    Export:
      Name: !Sub "${AWS::StackName}-AmazonMQSecretArn"

  # =============================================================================
  # ROUTE53 OUTPUTS
  # =============================================================================
  PrivateHostedZoneId:
    Condition: HasDomainName
    Description: Route53 Private Hosted Zone ID
    Value: !GetAtt Route53Stack.Outputs.PrivateHostedZoneId
    Export:
      Name: !Sub "${AWS::StackName}-PrivateHostedZoneId"

  PrivateHostedZoneName:
    Condition: HasDomainName
    Description: Route53 Private Hosted Zone Name
    Value: !GetAtt Route53Stack.Outputs.PrivateHostedZoneName
    Export:
      Name: !Sub "${AWS::StackName}-PrivateHostedZoneName"

  # =============================================================================
  # ALB CONTROLLER OUTPUTS
  # =============================================================================
  ALBControllerRoleArn:
    Condition: ShouldEnableALBController
    Description: ALB Controller IAM Role ARN
    Value: !GetAtt ALBControllerStack.Outputs.ALBControllerRoleArn
    Export:
      Name: !Sub "${AWS::StackName}-ALBControllerRoleArn"

  # =============================================================================
  # EXTERNAL DNS OUTPUTS
  # =============================================================================
  ExternalDNSRoleArn:
    Condition: ShouldEnableExternalDNS
    Description: ExternalDNS IAM Role ARN
    Value: !GetAtt ExternalDNSStack.Outputs.ExternalDNSRoleArn
    Export:
      Name: !Sub "${AWS::StackName}-ExternalDNSRoleArn"

  # =============================================================================
  # MIDAZ APPLICATION OUTPUTS
  # =============================================================================
  MidazNamespace:
    Condition: ShouldDeployApplication
    Description: Kubernetes namespace where Midaz is deployed
    Value: !GetAtt MidazHelmStack.Outputs.HelmNamespace
    Export:
      Name: !Sub "${AWS::StackName}-MidazNamespace"

  MidazAPIEndpoint:
    Condition: ShouldDeployApplication
    Description: Midaz Ledger API endpoint
    Value: !GetAtt MidazHelmStack.Outputs.LedgerAPIEndpoint
    Export:
      Name: !Sub "${AWS::StackName}-MidazAPIEndpoint"

  # =============================================================================
  # UTILITY COMMANDS
  # =============================================================================
  KubeconfigCommand:
    Description: Command to configure kubectl
    Value: !Sub "aws eks update-kubeconfig --name ${EKSStack.Outputs.ClusterName} --region ${AWS::Region}"

  CheckMidazPodsCommand:
    Condition: ShouldDeployApplication
    Description: Command to check Midaz pods status
    Value: "kubectl get pods -n midaz"
