AWSTemplateFormatVersion: '2010-09-09'
Description: |
  S3 Bucket for hosting Midaz CloudFormation templates.
  This bucket is configured for public read access required by AWS Marketplace.

Parameters:
  BucketName:
    Type: String
    Default: midaz-cloudformation-templates
    Description: Name of the S3 bucket for templates
    AllowedPattern: "^[a-z0-9][a-z0-9-]{1,61}[a-z0-9]$"
    ConstraintDescription: "Must be a valid S3 bucket name (3-63 characters, lowercase, numbers, hyphens)"

  EnableVersioning:
    Type: String
    Default: "true"
    AllowedValues:
      - "true"
      - "false"
    Description: Enable S3 versioning for template history

  EnableLogging:
    Type: String
    Default: "true"
    AllowedValues:
      - "true"
      - "false"
    Description: Enable access logging

Conditions:
  ShouldEnableVersioning: !Equals [!Ref EnableVersioning, "true"]
  ShouldEnableLogging: !Equals [!Ref EnableLogging, "true"]

Resources:
  # =============================================================================
  # LOGGING BUCKET
  # =============================================================================
  LoggingBucket:
    Type: AWS::S3::Bucket
    Condition: ShouldEnableLogging
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Sub "${BucketName}-logs"
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldLogs
            Status: Enabled
            ExpirationInDays: 90
      Tags:
        - Key: Purpose
          Value: CloudFormation Template Access Logs

  LoggingBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Condition: ShouldEnableLogging
    Properties:
      Bucket: !Ref LoggingBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: S3ServerAccessLogsPolicy
            Effect: Allow
            Principal:
              Service: logging.s3.amazonaws.com
            Action: s3:PutObject
            Resource: !Sub "${LoggingBucket.Arn}/*"
            Condition:
              ArnLike:
                aws:SourceArn: !Sub "arn:aws:s3:::${BucketName}"
              StringEquals:
                aws:SourceAccount: !Ref AWS::AccountId

  # =============================================================================
  # TEMPLATES BUCKET
  # =============================================================================
  TemplatesBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Ref BucketName
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: !If [ShouldEnableVersioning, Enabled, Suspended]
      LoggingConfiguration: !If
        - ShouldEnableLogging
        - DestinationBucketName: !Ref LoggingBucket
          LogFilePrefix: "access-logs/"
        - !Ref AWS::NoValue
      PublicAccessBlockConfiguration:
        # Allow public read for CloudFormation templates (required for Marketplace)
        BlockPublicAcls: true
        BlockPublicPolicy: false
        IgnorePublicAcls: true
        RestrictPublicBuckets: false
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders:
              - '*'
            AllowedMethods:
              - GET
              - HEAD
            AllowedOrigins:
              - '*'
            MaxAge: 3600
      Tags:
        - Key: Purpose
          Value: CloudFormation Templates
        - Key: PublicAccess
          Value: ReadOnly

  # =============================================================================
  # BUCKET POLICY - PUBLIC READ FOR TEMPLATES
  # =============================================================================
  TemplatesBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref TemplatesBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          # Allow public read access to templates (required for CloudFormation)
          - Sid: PublicReadTemplates
            Effect: Allow
            Principal: '*'
            Action:
              - s3:GetObject
            Resource:
              - !Sub "${TemplatesBucket.Arn}/templates/*"
              - !Sub "${TemplatesBucket.Arn}/releases/*"
              - !Sub "${TemplatesBucket.Arn}/versions/*"
              - !Sub "${TemplatesBucket.Arn}/versions.json"

          # Allow CloudFormation service to access templates
          - Sid: CloudFormationAccess
            Effect: Allow
            Principal:
              Service: cloudformation.amazonaws.com
            Action:
              - s3:GetObject
            Resource:
              - !Sub "${TemplatesBucket.Arn}/*"

          # Deny non-HTTPS access
          - Sid: DenyInsecureConnections
            Effect: Deny
            Principal: '*'
            Action: s3:*
            Resource:
              - !GetAtt TemplatesBucket.Arn
              - !Sub "${TemplatesBucket.Arn}/*"
            Condition:
              Bool:
                aws:SecureTransport: 'false'

  # =============================================================================
  # IAM ROLE FOR GITHUB ACTIONS (OIDC)
  # =============================================================================
  GitHubActionsRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${BucketName}-github-actions"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Federated: !Sub "arn:aws:iam::${AWS::AccountId}:oidc-provider/token.actions.githubusercontent.com"
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
              StringLike:
                # Update this with your GitHub org/repo
                token.actions.githubusercontent.com:sub: "repo:LerianStudio/midaz-cloudformation-foundation:*"
      Policies:
        - PolicyName: S3TemplatesAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                  - s3:DeleteObject
                  - s3:ListBucket
                Resource:
                  - !GetAtt TemplatesBucket.Arn
                  - !Sub "${TemplatesBucket.Arn}/*"
      Tags:
        - Key: Purpose
          Value: GitHub Actions CI/CD

  # =============================================================================
  # GITHUB OIDC PROVIDER (if not exists)
  # =============================================================================
  # Note: You may need to create this separately if not already in your account
  # GitHubOIDCProvider:
  #   Type: AWS::IAM::OIDCProvider
  #   Properties:
  #     Url: https://token.actions.githubusercontent.com
  #     ClientIdList:
  #       - sts.amazonaws.com
  #     ThumbprintList:
  #       - 6938fd4d98bab03faadb97b34396831e3780aea1
  #       - 1c58a3a8518e8759bf075b76b750d4f2df264fcd

Outputs:
  BucketName:
    Description: S3 Bucket Name
    Value: !Ref TemplatesBucket
    Export:
      Name: !Sub "${AWS::StackName}-BucketName"

  BucketArn:
    Description: S3 Bucket ARN
    Value: !GetAtt TemplatesBucket.Arn
    Export:
      Name: !Sub "${AWS::StackName}-BucketArn"

  BucketDomainName:
    Description: S3 Bucket Domain Name
    Value: !GetAtt TemplatesBucket.DomainName

  BucketRegionalDomainName:
    Description: S3 Bucket Regional Domain Name
    Value: !GetAtt TemplatesBucket.RegionalDomainName

  TemplatesBaseUrl:
    Description: Base URL for templates
    Value: !Sub "https://${TemplatesBucket}.s3.${AWS::Region}.amazonaws.com/templates"

  LatestTemplateUrl:
    Description: URL for latest master template
    Value: !Sub "https://${TemplatesBucket}.s3.${AWS::Region}.amazonaws.com/templates/latest/midaz-complete.yaml"

  GitHubActionsRoleArn:
    Description: IAM Role ARN for GitHub Actions
    Value: !GetAtt GitHubActionsRole.Arn
    Export:
      Name: !Sub "${AWS::StackName}-GitHubActionsRoleArn"

  QuickLaunchUrl:
    Description: Quick Launch URL for CloudFormation
    Value: !Sub "https://console.aws.amazon.com/cloudformation/home?region=${AWS::Region}#/stacks/quickcreate?stackName=midaz&templateURL=https://${TemplatesBucket}.s3.${AWS::Region}.amazonaws.com/templates/latest/midaz-complete.yaml"

  MarketplaceParameters:
    Description: Parameters to use for AWS Marketplace
    Value: !Sub |
      MPS3BucketName: ${TemplatesBucket}
      MPS3BucketRegion: ${AWS::Region}
      MPS3KeyPrefix: templates/latest/
